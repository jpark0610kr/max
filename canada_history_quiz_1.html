<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canada History Quiz 🍁</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #16213e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .screen { display: none; width: 100%; max-width: 660px; }
  .screen.active { display: block; }

  /* START */
  #start {
    background: #1a1a2e;
    border-radius: 28px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .maple { font-size: 72px; display: block; margin-bottom: 12px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  h1 { font-family:'Fredoka One',cursive; font-size:2.4rem; color:#FFF8E7; line-height:1.1; margin-bottom:6px; }
  .subtitle { color:#FFD700; font-weight:700; font-size:1rem; letter-spacing:1px; margin-bottom:28px; }
  .tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:24px; }
  .tab {
    padding: 9px 18px; border-radius: 20px;
    border: 2px solid #4a4a7c; background: #2a2a4c; color: #ccc;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; transition: all 0.18s;
  }
  .tab:hover { background:#3a3a6c; color:#fff; }
  .tab.active { background:#FFD700; color:#1a1a2e; border-color:#FFD700; }
  .btn-start {
    background: #C8102E; color: white; border: none;
    padding: 16px 48px; border-radius: 50px;
    font-family: 'Fredoka One', cursive; font-size: 1.4rem;
    cursor: pointer; box-shadow: 0 6px 0 #9B0B22; transition: all 0.15s;
  }
  .btn-start:hover { transform:translateY(-3px); box-shadow:0 9px 0 #9B0B22; }
  .btn-start:active { transform:translateY(3px); box-shadow:0 2px 0 #9B0B22; }

  /* QUIZ */
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .q-counter { color:rgba(255,255,255,0.5); font-weight:700; font-size:0.85rem; letter-spacing:1px; }
  .btn-home-top {
    background: #2a2a4c; color: white; border: none;
    padding: 7px 14px; border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.8rem;
    cursor: pointer; transition: all 0.18s;
  }
  .btn-home-top:hover { background:#3a3a6c; }
  .progress-wrap { background:rgba(255,255,255,0.12); border-radius:8px; height:8px; margin-bottom:18px; }
  .progress-bar { background:linear-gradient(90deg,#FFD700,#C8102E); height:100%; border-radius:8px; transition:width 0.4s ease; }
  .card {
    background: #FFF8E7; border-radius: 22px; padding: 28px 24px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.35); position: relative; overflow: hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:5px;
    background: linear-gradient(90deg,#C8102E,#FFD700);
  }
  .section-badge {
    display:inline-block; background:#C8102E; color:white;
    padding:3px 12px; border-radius:20px; font-size:0.72rem;
    font-weight:800; letter-spacing:1px; margin-bottom:14px;
  }
  .q-text { font-size:1.1rem; font-weight:800; color:#1a1a2e; line-height:1.5; margin-bottom:20px; }

  /* Options */
  .options { display:flex; flex-direction:column; gap:10px; }
  .opt {
    background: white; border: 2.5px solid #e0d5c0; border-radius: 14px;
    padding: 13px 16px; text-align: left;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem; color: #1a1a2e;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 10px;
  }
  .opt:hover:not(:disabled) { border-color:#C8102E; background:#fff5f5; transform:translateX(3px); }
  .opt .ltr {
    width:30px; height:30px; border-radius:50%; background:#f0e8d5;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:0.8rem; flex-shrink:0;
  }
  .opt.correct { background:#d4f5e2; border-color:#2ECC71; }
  .opt.correct .ltr { background:#2ECC71; color:white; }
  .opt.wrong { background:#fde8e8; border-color:#E74C3C; }
  .opt.wrong .ltr { background:#E74C3C; color:white; }
  .opt:disabled { cursor:default; }

  /* True/False */
  .tf-wrap { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .tf {
    border: 2.5px solid #e0d5c0; border-radius:14px; padding:18px;
    text-align:center; font-family:'Fredoka One',cursive; font-size:1.3rem;
    cursor:pointer; transition:all 0.15s; background:white;
  }
  .tf:hover:not(:disabled) { transform:translateY(-3px); }
  .tf.t { color:#27AE60; }
  .tf.f { color:#E74C3C; }
  .tf.correct { background:#d4f5e2; border-color:#2ECC71; }
  .tf.wrong   { background:#fde8e8; border-color:#E74C3C; }
  .tf:disabled { cursor:default; }

  /* Feedback */
  .feedback {
    margin-top:16px; padding:13px 16px; border-radius:12px;
    font-weight:700; font-size:0.9rem; line-height:1.5; display:none;
  }
  .feedback.show { display:block; animation:fadeIn 0.25s ease; }
  .feedback.ok  { background:#d4f5e2; color:#1a6b38; border:2px solid #2ECC71; }
  .feedback.bad { background:#fde8e8; color:#8B0000; border:2px solid #E74C3C; }

  /* Nav */
  .nav { display:flex; gap:10px; margin-top:14px; }
  .btn-back {
    background: #2a2a4c; color: white; border: none;
    padding: 13px 20px; border-radius: 14px;
    font-family: 'Fredoka One', cursive; font-size: 1rem;
    cursor: pointer; transition: all 0.15s; flex-shrink:0;
  }
  .btn-back:hover { background:#3a3a6c; transform:translateY(-2px); }
  .btn-back:disabled { opacity:0.3; cursor:default; transform:none; }
  .btn-next {
    flex: 1; background: #1a1a2e; color: white; border: none;
    padding: 13px; border-radius: 14px;
    font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    cursor: pointer; transition: all 0.15s; display:none;
  }
  .btn-next.show { display:block; animation:fadeIn 0.25s ease; }
  .btn-next:hover { background:#C8102E; transform:translateY(-2px); }

  /* RESULT */
  #result {
    background: #FFF8E7; border-radius: 24px; padding: 36px 28px;
    text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .result-emoji { font-size:3rem; display:block; margin-bottom:16px; }
  .score-ring {
    width:130px; height:130px; border-radius:50%; background:#1a1a2e;
    border:6px solid #FFD700; margin:0 auto 20px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .score-num { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#FFD700; line-height:1; }
  .score-lbl { color:rgba(255,255,255,0.5); font-size:0.75rem; font-weight:700; }
  .result-title { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#1a1a2e; margin-bottom:6px; }
  .result-msg { color:#666; font-weight:600; font-size:0.95rem; margin-bottom:24px; }
  .result-btns { display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
  .btn-retry {
    background:#C8102E; color:white; border:none;
    padding:13px 28px; border-radius:50px;
    font-family:'Fredoka One',cursive; font-size:1.1rem;
    cursor:pointer; box-shadow:0 4px 0 #9B0B22; transition:all 0.15s;
  }
  .btn-retry:hover { transform:translateY(-2px); }
  .btn-home {
    background:#2a2a4c; color:white; border:none;
    padding:13px 28px; border-radius:50px;
    font-family:'Fredoka One',cursive; font-size:1.1rem;
    cursor:pointer; transition:all 0.15s;
  }
  .btn-home:hover { background:#3a3a6c; transform:translateY(-2px); }
  .review { text-align:left; display:flex; flex-direction:column; gap:7px; }
  .review-item {
    padding:10px 14px; border-radius:10px; font-size:0.85rem; font-weight:600;
    display:flex; align-items:flex-start; gap:8px;
  }
  .review-item.ok   { background:#d4f5e2; color:#1a6b38; }
  .review-item.miss { background:#fde8e8; color:#8B0000; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- START -->
<div id="start" class="screen active">
  <span class="maple">🍁</span>
  <h1>Canada History<br>Quiz Time!</h1>
  <p class="subtitle">Chapter 10 · The Dominion of Canada</p>
  <div class="tabs">
    <button class="tab active" data-section="all">All Sections</button>
    <button class="tab" data-section="10.1">10.1 Northwest</button>
    <button class="tab" data-section="10.2">10.2 Mounties</button>
    <button class="tab" data-section="10.3">10.3 Rebellion</button>
  </div>
  <button class="btn-start" id="btn-start">▶ Start Quiz!</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="top-bar">
    <span class="q-counter" id="q-counter">1 / 25</span>
    <button class="btn-home-top" id="btn-home-top">🏠 Home</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="card">
    <span class="section-badge" id="section-badge">10.1</span>
    <p class="q-text" id="q-text"></p>
    <div id="answer-area"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav">
      <button class="btn-back" id="btn-back">← Back</button>
      <button class="btn-next" id="btn-next">Next →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <span class="result-emoji" id="r-emoji">🏆</span>
  <div class="score-ring">
    <span class="score-num" id="r-score">0/0</span>
    <span class="score-lbl">SCORE</span>
  </div>
  <h2 class="result-title" id="r-title">Amazing!</h2>
  <p class="result-msg" id="r-msg"></p>
  <div class="result-btns">
    <button class="btn-retry" id="btn-retry">🔄 Try Again</button>
    <button class="btn-home" id="btn-home">🏠 Home</button>
  </div>
  <div class="review" id="review"></div>
</div>

<script>
var QUESTIONS = [
  // ── 10.1 ──
  {s:"10.1", type:"mc", q:"What did John A. Macdonald purchase from the Hudson's Bay Company in 1869?",
   opts:["Manitoba","Rupert's Land","British Columbia","The Northwest Company"],
   ans:1, ex:"Macdonald purchased Rupert's Land in 1869. It became part of Canada's Northwest Territories."},

  {s:"10.1", type:"mc", q:"When was the Northwest Territories officially created?",
   opts:["July 1, 1867","July 15, 1870","January 1, 1869","November 16, 1885"],
   ans:1, ex:"The Northwest Territories was officially created on July 15, 1870."},

  {s:"10.1", type:"mc", q:"Which native tribe lived in the Northwest, occupying Alberta, Saskatchewan, and Montana?",
   opts:["Cree","Sioux","Blackfoot","Assiniboine"],
   ans:2, ex:"The Blackfoot tribe lived in the Northwest and occupied those three regions."},

  {s:"10.1", type:"mc", q:"What was the name of the Hudson's Bay Company rival fur trading company?",
   opts:["The Metis Company","The Northwest Company (Nor'westers)","The Red River Company","The Blackfoot Trading Co."],
   ans:1, ex:"The rival company was called the Northwest Company, also known as the Nor'westers."},

  {s:"10.1", type:"mc", q:"What happened to the Hudson's Bay Company and Northwest Company in 1816?",
   opts:["They went to war","The Northwest Company won","The government forced them to merge","Hudson's Bay Company shut down"],
   ans:2, ex:"In 1816, the government forced the two rival companies to merge into one."},

  {s:"10.1", type:"mc", q:"What were people of both Native and European descent called?",
   opts:["Nor'westers","Metis","Settlers","Loyalists"],
   ans:1, ex:"Children of explorers and native women of both Native and European descent were called the Metis."},

  {s:"10.1", type:"mc", q:"What did the Metis fear when Canada gained control of Rupert's Land in 1869?",
   opts:["That the Mounties would arrest them","That their lands would be taken by English Canadians","That the buffalo would disappear","That Louis Riel would be executed"],
   ans:1, ex:"The Metis feared that their lands would be taken over by English Canadians."},

  {s:"10.1", type:"tf", q:"True or False: The Hudson Bay Company had a greater advantage over the Northwest Company because they had bigger boats and were closer to the west.",
   ans:true, ex:"TRUE! Bigger boats + closer to the west = bigger advantage for Hudson Bay Company."},

  {s:"10.1", type:"mc", q:"Who led the Red River Rebellion?",
   opts:["Douglas Selkirk","Gabriel Dumont","Louis Riel","General Middleton"],
   ans:2, ex:"Louis Riel became the leader of the Metis who opposed the Canadian government. (Douglas Selkirk started the farming settlement in 1811 — different person!)"},

  {s:"10.1", type:"mc", q:"What is Fort Garry now called?",
   opts:["Calgary","Edmonton","Winnipeg","Regina"],
   ans:2, ex:"Fort Garry, which was a Hudson Bay Company trading post, is now called Winnipeg."},

  {s:"10.1", type:"mc", q:"What happened to Thomas Scott?",
   opts:["He escaped to the US","He was sentenced to prison","He was captured and executed","He joined the Metis"],
   ans:2, ex:"Louis Riel allowed the capture and execution of Thomas Scott in March 1870 because he opposed the rebel government."},

  {s:"10.1", type:"mc", q:"When did Manitoba join Confederation?",
   opts:["1867","1869","1870","1873"],
   ans:2, ex:"Canada passed the Manitoba Act in 1870, officially creating the province of Manitoba."},

  // ── 10.2 ──
  {s:"10.2", type:"mc", q:"What did American traders bring to trade for furs with Native people?",
   opts:["Blankets and tools","Cheap liquor","Horses and guns","Food and medicine"],
   ans:1, ex:"The Americans brought cheap liquor to trade for furs — this corrupted the Native people."},

  {s:"10.2", type:"mc", q:"What was the most infamous whiskey trading fort called?",
   opts:["Fort Slide Out","Fort Standoff","Fort Whoop-Up","Fort Garry"],
   ans:2, ex:"Fort Whoop-Up was the wildest and most infamous of the whisky trading forts!"},

  {s:"10.2", type:"mc", q:"What colour are the Mounties' famous uniforms?",
   opts:["Blue","Red","Green","Black"],
   ans:1, ex:"The North-West Mounted Police wore bright RED uniforms — still iconic today!"},

  {s:"10.2", type:"mc", q:"In what year were the North-West Mounted Police officially established?",
   opts:["1867","1870","1873","1876"],
   ans:2, ex:"The Mounties were officially established in 1873."},

  {s:"10.2", type:"mc", q:"Under the Dominion Lands Act of 1872, how many acres could a settler receive?",
   opts:["80 acres","100 acres","120 acres","160 acres"],
   ans:3, ex:"The Dominion Lands Act gave each family or 21-year-old man 160 acres of land."},

  {s:"10.2", type:"mc", q:"Jerry Potts worked as a scout for the Mounties for how many years?",
   opts:["10 years","15 years","22 years","30 years"],
   ans:2, ex:"Jerry Potts worked as a scout for the Mounties for 22 years and became a western legend!"},

  {s:"10.2", type:"tf", q:"True or False: Natives automatically became Canadian citizens through Treaty 6.",
   ans:false, ex:"FALSE! Treaty 6 did NOT make natives citizens. They had to be fluent in English/French AND give up treaty rights."},

  // ── 10.3 ──
  {s:"10.3", type:"mc", q:"Why did the Natives feel cheated by the government?",
   opts:["They were not given land","Buffalo disappeared and they only got poor quality rations instead of promised food","Their chiefs were arrested","The Mounties took their horses"],
   ans:1, ex:"Buffalo disappeared because of settlers and the CPR. The government promised food under Treaty 6 but gave only poor quality rations."},

  {s:"10.3", type:"mc", q:"Who convinced Louis Riel to return from the United States?",
   opts:["Chief Big Bear","Chief Poundmaker","Gabriel Dumont","General Middleton"],
   ans:2, ex:"Gabriel Dumont, the Metis leader, went to the US and convinced Louis Riel to return and fight."},

  {s:"10.3", type:"mc", q:"Name the two Cree native leaders who joined the Metis rebellion.",
   opts:["Chief Sitting Bull and Chief Crazy Horse","Chief Poundmaker and Chief Big Bear","Chief Blackfoot and Chief Riel","Chief Jerry and Chief Dumont"],
   ans:1, ex:"The Cree were led by Chief Poundmaker and Chief Big Bear, who both joined the Metis revolt."},

  {s:"10.3", type:"mc", q:"What happened at the Battle of Duck Lake on March 26, 1885?",
   opts:["The Mounties defeated the Metis easily","The Metis ambushed the Mounties — 12 killed, 12 wounded, forced to retreat","Louis Riel was captured","The Cree surrendered"],
   ans:1, ex:"The Metis rebels ambushed the Mounties. 12 men killed, 12 wounded — the Mounties retreated!"},

  {s:"10.3", type:"mc", q:"Where were the Metis rebels finally defeated?",
   opts:["Duck Lake","Fort Garry","Batoche","Winnipeg"],
   ans:2, ex:"At Batoche! After 3 days of fighting and running out of ammo (they used nails and buttons!), defeated May 12, 1885."},

  {s:"10.3", type:"mc", q:"What happened to Louis Riel after the rebellion?",
   opts:["He escaped to the US like Dumont","He was sentenced to 3 years in prison","He was tried for high treason and hanged in Regina","He was pardoned"],
   ans:2, ex:"Louis Riel was tried for high treason and hanged in Regina on November 16, 1885."}
];

// ── State ──
var pool = [];
var idx = 0;
var score = 0;
var answered = false;
var log = [];
var section = "all";

// ── Helpers ──
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
}

function goHome() {
  pool = []; idx = 0; score = 0; log = []; answered = false;
  section = "all";
  var tabs = document.querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  document.querySelector(".tab[data-section='all']").classList.add("active");
  showScreen("start");
}

// ── Tabs ──
var tabs = document.querySelectorAll(".tab");
for (var ti = 0; ti < tabs.length; ti++) {
  tabs[ti].addEventListener("click", function() {
    var allTabs = document.querySelectorAll(".tab");
    for (var i = 0; i < allTabs.length; i++) allTabs[i].classList.remove("active");
    this.classList.add("active");
    section = this.getAttribute("data-section");
  });
}

// ── Start ──
document.getElementById("btn-start").addEventListener("click", function() {
  var src = section === "all" ? QUESTIONS : QUESTIONS.filter(function(q){ return q.s === section; });
  pool = shuffle(src);
  idx = 0; score = 0; log = []; answered = false;
  showScreen("quiz");
  renderQuestion();
});

// ── Home buttons ──
document.getElementById("btn-home-top").addEventListener("click", goHome);
document.getElementById("btn-home").addEventListener("click", goHome);

// ── Render ──
function renderQuestion() {
  var q = pool[idx];
  answered = false;

  document.getElementById("q-counter").textContent = (idx + 1) + " / " + pool.length;
  document.getElementById("progress-bar").style.width = ((idx / pool.length) * 100) + "%";
  document.getElementById("section-badge").textContent = "Section " + q.s;
  document.getElementById("q-text").textContent = q.q;

  var fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.textContent = "";

  var nb = document.getElementById("btn-next");
  nb.className = "btn-next";
  nb.textContent = (idx === pool.length - 1) ? "See Results!" : "Next →";

  document.getElementById("btn-back").disabled = (idx === 0);

  var area = document.getElementById("answer-area");
  area.innerHTML = "";

  if (q.type === "mc") {
    var wrap = document.createElement("div");
    wrap.className = "options";
    var letters = ["A","B","C","D"];
    for (var i = 0; i < q.opts.length; i++) {
      (function(i) {
        var btn = document.createElement("button");
        btn.className = "opt";
        btn.innerHTML = '<span class="ltr">' + letters[i] + "</span>" + q.opts[i];
        btn.addEventListener("click", function(){ checkMC(i); });
        wrap.appendChild(btn);
      })(i);
    }
    area.appendChild(wrap);
  } else {
    var wrap2 = document.createElement("div");
    wrap2.className = "tf-wrap";
    var t = document.createElement("button");
    t.className = "tf t"; t.textContent = "✅ TRUE";
    t.addEventListener("click", function(){ checkTF(true); });
    var f = document.createElement("button");
    f.className = "tf f"; f.textContent = "❌ FALSE";
    f.addEventListener("click", function(){ checkTF(false); });
    wrap2.appendChild(t); wrap2.appendChild(f);
    area.appendChild(wrap2);
  }
}

// ── Check ──
function checkMC(chosen) {
  if (answered) return;
  answered = true;
  var q = pool[idx];
  var btns = document.querySelectorAll(".opt");
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  var correct = (chosen === q.ans);
  btns[chosen].classList.add(correct ? "correct" : "wrong");
  if (!correct) btns[q.ans].classList.add("correct");
  recordAndShow(correct, q.ex);
}

function checkTF(chosen) {
  if (answered) return;
  answered = true;
  var q = pool[idx];
  var btns = document.querySelectorAll(".tf");
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  var correct = (chosen === q.ans);
  var chosenBtn = chosen ? btns[0] : btns[1];
  chosenBtn.classList.add(correct ? "correct" : "wrong");
  if (!correct) (q.ans ? btns[0] : btns[1]).classList.add("correct");
  recordAndShow(correct, q.ex);
}

function recordAndShow(correct, explain) {
  if (log.length <= idx) {
    log.push({ q: pool[idx].q, correct: correct });
    if (correct) score++;
  } else {
    var old = log[idx];
    if (old.correct !== correct) {
      if (old.correct) score--;
      if (correct) score++;
      log[idx] = { q: pool[idx].q, correct: correct };
    }
  }
  var fb = document.getElementById("feedback");
  fb.textContent = (correct ? "🎉 Correct! " : "❌ Not quite. ") + explain;
  fb.className = "feedback show " + (correct ? "ok" : "bad");
  document.getElementById("btn-next").className = "btn-next show";
}

// ── Nav ──
document.getElementById("btn-next").addEventListener("click", function() {
  if (!answered) return;
  idx++;
  if (idx >= pool.length) {
    showResult();
  } else {
    renderQuestion();
  }
});

document.getElementById("btn-back").addEventListener("click", function() {
  if (idx <= 0) return;
  if (answered && log.length > idx) {
    var entry = log.pop();
    if (entry.correct) score--;
  }
  idx--;
  if (log.length > idx) {
    var prev = log.pop();
    if (prev.correct) score--;
  }
  renderQuestion();
});

// ── Result ──
function showResult() {
  document.getElementById("progress-bar").style.width = "100%";
  showScreen("result");
  var pct = score / pool.length;
  document.getElementById("r-score").textContent = score + "/" + pool.length;
  var emoji, title, msg;
  if (pct === 1)      { emoji="🏆"; title="PERFECT SCORE!";   msg="You're a Canadian history champion!"; }
  else if (pct >= .8) { emoji="🌟"; title="Excellent!";        msg="Almost perfect — you really know this stuff!"; }
  else if (pct >= .6) { emoji="👍"; title="Good Job!";          msg="Solid! Review the missed ones and try again."; }
  else if (pct >= .4) { emoji="📚"; title="Keep Studying!";    msg="You've got some of it! Read the chapter again."; }
  else                { emoji="🍁"; title="Let's Study More!"; msg="Don't give up! Go over the chapter and retry."; }
  document.getElementById("r-emoji").textContent = emoji;
  document.getElementById("r-title").textContent = title;
  document.getElementById("r-msg").textContent = msg;
  var html = "";
  for (var i = 0; i < log.length; i++) {
    html += '<div class="review-item ' + (log[i].correct ? "ok" : "miss") + '">' +
            '<span>' + (log[i].correct ? "✅" : "❌") + "</span>" +
            "<span>" + log[i].q + "</span></div>";
  }
  document.getElementById("review").innerHTML = html;
}

document.getElementById("btn-retry").addEventListener("click", function() {
  idx = 0; score = 0; log = []; answered = false;
  pool = shuffle(pool);
  showScreen("quiz");
  renderQuestion();
});
</script>
</body>
</html>
