<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max's Health Quiz! 🫀</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF4757;
    --blue: #2ED4FF;
    --yellow: #FFD700;
    --green: #2ECC71;
    --purple: #A855F7;
    --orange: #FF8C00;
    --dark: #1a1a2e;
    --card: #16213e;
    --text: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background dots */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(46,212,255,0.08) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Floating hearts background */
  .bg-hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .bg-heart {
    position: absolute;
    font-size: 24px;
    opacity: 0.07;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.07; }
    90% { opacity: 0.07; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 20px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 30px 0 20px;
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--yellow);
    text-shadow: 0 0 30px rgba(255,215,0,0.4), 4px 4px 0 rgba(0,0,0,0.3);
    line-height: 1.1;
    animation: titlePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes titlePop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .header p {
    color: var(--blue);
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* SCORE BAR */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 14px 24px;
    margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .score-item {
    text-align: center;
  }
  .score-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    font-weight: 700;
  }
  .score-value {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--yellow);
    line-height: 1;
    margin-top: 2px;
  }
  .score-item.stars .score-value { color: var(--yellow); }
  .score-item.correct .score-value { color: var(--green); }
  .score-item.total .score-value { color: var(--blue); }

  /* PROGRESS BAR */
  .progress-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    height: 12px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    border-radius: 50px;
    transition: width 0.5s ease;
    position: relative;
    overflow: hidden;
  }
  .progress-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 32px;
    margin-bottom: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideIn {
    from { transform: translateY(30px) scale(0.95); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .question-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--purple), #7C3AED);
    color: white;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 6px 14px;
    border-radius: 50px;
    margin-bottom: 16px;
  }

  .question-text {
    font-size: clamp(1.1rem, 3vw, 1.35rem);
    font-weight: 800;
    color: white;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  /* MULTIPLE CHOICE */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 500px) {
    .options-grid { grid-template-columns: 1fr; }
  }

  .option-btn {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px 18px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(46,212,255,0.15);
    border-color: var(--blue);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(46,212,255,0.2);
  }
  .option-btn .letter {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) .letter {
    background: var(--blue);
    color: var(--dark);
  }
  .option-btn.correct {
    background: rgba(46,204,113,0.2);
    border-color: var(--green);
    animation: correctPulse 0.5s ease;
  }
  .option-btn.correct .letter { background: var(--green); color: white; }
  .option-btn.wrong {
    background: rgba(255,71,87,0.2);
    border-color: var(--red);
    animation: shake 0.4s ease;
  }
  .option-btn.wrong .letter { background: var(--red); color: white; }
  .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }

  @keyframes correctPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* FILL IN THE BLANK */
  .fill-input-wrap {
    position: relative;
  }
  .fill-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 16px 20px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    outline: none;
    transition: all 0.2s;
  }
  .fill-input:focus {
    border-color: var(--blue);
    background: rgba(46,212,255,0.08);
    box-shadow: 0 0 0 4px rgba(46,212,255,0.15);
  }
  .fill-input.correct {
    border-color: var(--green);
    background: rgba(46,204,113,0.1);
  }
  .fill-input.wrong {
    border-color: var(--red);
    background: rgba(255,71,87,0.1);
  }
  .fill-input::placeholder { color: rgba(255,255,255,0.3); }

  .submit-btn {
    margin-top: 14px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border: none;
    border-radius: 16px;
    padding: 14px 32px;
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(46,212,255,0.3);
    letter-spacing: 0.5px;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(46,212,255,0.4); }
  .submit-btn:active { transform: translateY(0); }

  /* FEEDBACK */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 1rem;
    display: none;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }
  .feedback.show { display: flex; animation: fadeIn 0.3s ease; }
  .feedback.correct-fb {
    background: rgba(46,204,113,0.15);
    border: 2px solid rgba(46,204,113,0.4);
    color: #7FFFC4;
  }
  .feedback.wrong-fb {
    background: rgba(255,71,87,0.15);
    border: 2px solid rgba(255,71,87,0.4);
    color: #FFB3BB;
  }
  .feedback-icon { font-size: 1.4rem; flex-shrink: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* NEXT BTN */
  .next-btn {
    display: none;
    width: 100%;
    margin-top: 16px;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    border: none;
    border-radius: 16px;
    padding: 16px;
    color: var(--dark);
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(255,215,0,0.3);
  }
  .next-btn.show { display: block; animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .next-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 30px rgba(255,215,0,0.4); }
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* RESULT SCREEN */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    animation: slideIn 0.5s ease;
  }
  .result-screen.show { display: block; }

  .result-emoji { font-size: 5rem; margin-bottom: 20px; animation: bounce 1s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    margin-bottom: 10px;
  }
  .result-score-big {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(3rem, 10vw, 5rem);
    line-height: 1;
    margin: 20px 0;
  }
  .result-msg { font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 30px; }

  .stars-display { font-size: 2.5rem; margin: 10px 0 20px; }

  .restart-btn {
    background: linear-gradient(135deg, var(--purple), #6D28D9);
    border: none;
    border-radius: 20px;
    padding: 18px 48px;
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 25px rgba(168,85,247,0.4);
    letter-spacing: 0.5px;
  }
  .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(168,85,247,0.5); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* HINT BUTTON */
  .hint-btn {
    background: none;
    border: 2px solid rgba(255,215,0,0.4);
    border-radius: 50px;
    padding: 6px 16px;
    color: var(--yellow);
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
  }
  .hint-btn:hover { background: rgba(255,215,0,0.1); border-color: var(--yellow); }
  .hint-text {
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(255,215,0,0.1);
    border-radius: 10px;
    color: var(--yellow);
    font-size: 0.9rem;
    font-weight: 700;
    display: none;
  }
  .hint-text.show { display: block; animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<div class="bg-hearts" id="bgHearts"></div>

<div class="container">
  <!-- HEADER -->
  <div class="header">
    <h1>🫀 Health Quiz!</h1>
    <p>Chapter 3 · Your Transportation System</p>
  </div>

  <!-- SCORE BAR -->
  <div class="score-bar">
    <div class="score-item stars">
      <div class="score-label">⭐ Stars</div>
      <div class="score-value" id="starCount">0</div>
    </div>
    <div class="score-item correct">
      <div class="score-label">✅ Correct</div>
      <div class="score-value" id="correctCount">0</div>
    </div>
    <div class="score-item total">
      <div class="score-label">📋 Total</div>
      <div class="score-value" id="totalCount">0/15</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <!-- QUESTION CARD -->
  <div class="question-card" id="questionCard">
    <div class="question-badge" id="questionBadge">❓ Question 1</div>
    <div class="question-text" id="questionText"></div>
    <div id="answerArea"></div>
    <div class="feedback" id="feedback">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span id="feedbackText"></span>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question ➡️</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle" style="color: var(--yellow);">Quiz Complete!</div>
    <div class="result-score-big" id="resultScore"></div>
    <div class="stars-display" id="resultStars"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Play Again!</button>
  </div>
</div>

<script>
const questions = [
  // --- MULTIPLE CHOICE ---
  {
    type: 'mc',
    badge: '🔴 Blood',
    question: 'Which part of the blood carries oxygen to your cells?',
    options: ['White blood cells', 'Red blood cells', 'Platelets', 'Plasma'],
    answer: 1,
    feedback: 'Red blood cells carry oxygen throughout your body! 🩸',
    hint: 'Think about what color oxygen-carrying blood is!'
  },
  {
    type: 'mc',
    badge: '🦠 Immunity',
    question: 'When you have a cold, which part of the blood helps you fight it?',
    options: ['Red blood cells', 'Platelets', 'White blood cells', 'Arteries'],
    answer: 2,
    feedback: 'White blood cells are your body\'s fighters against disease and infection! 🛡️',
    hint: 'These cells protect you from germs!'
  },
  {
    type: 'mc',
    badge: '🩹 Healing',
    question: 'When you scrape your knee, which part of the blood helps it stop bleeding?',
    options: ['White blood cells', 'Red blood cells', 'Veins', 'Platelets'],
    answer: 3,
    feedback: 'Platelets help your blood clot so cuts stop bleeding! 🩹',
    hint: 'These tiny cells form a "plug" at the cut.'
  },
  {
    type: 'mc',
    badge: '🫀 Heart',
    question: 'Which side of the heart receives oxygen-rich blood FROM the lungs?',
    options: ['Left side', 'Right side', 'Both sides equally', 'The top (atrium)'],
    answer: 0,
    feedback: 'The LEFT side of the heart receives oxygen-rich blood from the lungs! ❤️',
    hint: 'Remember: L for Left, L for Lungs-oxygen!'
  },
  {
    type: 'mc',
    badge: '🩸 Blood Vessels',
    question: 'Which blood vessels carry oxygenated blood AWAY from the heart?',
    options: ['Veins', 'Capillaries', 'Arteries', 'Chambers'],
    answer: 2,
    feedback: 'Arteries carry oxygenated blood away from the heart! Think: "A" for Away! 🏃',
    hint: 'A = Arteries = Away from heart!'
  },
  {
    type: 'mc',
    badge: '🩸 Blood Vessels',
    question: 'Which blood vessels carry blood BACK TO the heart?',
    options: ['Arteries', 'Capillaries', 'Chambers', 'Veins'],
    answer: 3,
    feedback: 'Veins carry blood back to the heart! They have thinner walls than arteries. 💙',
    hint: 'V = Veins = going back to the heart!'
  },
  {
    type: 'mc',
    badge: '🔬 Vessels',
    question: 'Which blood vessels have the THINNEST walls and link arteries to veins?',
    options: ['Arteries', 'Veins', 'Capillaries', 'Chambers'],
    answer: 2,
    feedback: 'Capillaries are super thin! They connect arteries and veins. 🔬',
    hint: 'These are the smallest blood vessels!'
  },
  {
    type: 'mc',
    badge: '💪 Exercise',
    question: 'Which of these activities BUILDS ENDURANCE for your heart?',
    options: ['Drawing a picture', 'Reading a book', 'Playing a video game', 'Swimming'],
    answer: 3,
    feedback: 'Swimming is great for building endurance! Your heart gets stronger! 🏊',
    hint: 'Think about which one makes your heart beat faster!'
  },
  {
    type: 'mc',
    badge: '🍎 Nutrition',
    question: 'Why are WHOLE GRAINS better for your heart than refined grains?',
    options: [
      'They taste better',
      'They have more fiber and nutrients',
      'They are cheaper',
      'They cook faster'
    ],
    answer: 1,
    feedback: 'Whole grains have more fiber and nutrients that keep your heart healthy! 🌾',
    hint: 'Think about what\'s been removed from refined grains!'
  },
  {
    type: 'mc',
    badge: '🧡 Health',
    question: 'Why should you eat salty foods, sugar, and solid fats in MODERATION?',
    options: [
      'They are too expensive',
      'Too much can harm your heart and blood vessels',
      'They don\'t taste good',
      'They are hard to find'
    ],
    answer: 1,
    feedback: 'Too much salt, sugar, and solid fats can damage your heart and blood vessels over time! 🏥',
    hint: 'Too much of a bad thing can hurt your circulatory system!'
  },

  // --- FILL IN THE BLANK ---
  {
    type: 'fill',
    badge: '📝 Fill In',
    question: 'The thumping feeling in your arteries caused by your heartbeat is called your ______.',
    answer: 'pulse',
    altAnswers: ['pulse rate'],
    feedback: 'Your PULSE is the thumping feeling caused by your heartbeat! You can feel it on your wrist! 💓',
    hint: 'You can check this on your wrist!'
  },
  {
    type: 'fill',
    badge: '📝 Fill In',
    question: 'The force exerted on the walls of your blood vessels is called ______ ______.',
    answer: 'blood pressure',
    altAnswers: ['bloodpressure'],
    feedback: 'BLOOD PRESSURE is the force your blood pushes against your vessel walls! Doctors check this often! 💉',
    hint: 'Two words — doctors check this with a cuff on your arm!'
  },
  {
    type: 'fill',
    badge: '📝 Fill In',
    question: 'The heart is made of a special type of muscle called ______ muscle.',
    answer: 'cardiac',
    altAnswers: ['cardiac muscle'],
    feedback: 'CARDIAC muscle is the special muscle that makes up your heart! It never gets tired! 💪🫀',
    hint: 'This word comes from the Latin word for heart!'
  },
  {
    type: 'fill',
    badge: '📝 Fill In',
    question: 'White blood cells produce ______ that protect your body from disease and infection.',
    answer: 'antibodies',
    altAnswers: ['antibody'],
    feedback: 'ANTIBODIES are made by white blood cells to fight off germs and infections! 🦠🛡️',
    hint: 'These are tiny proteins that attack germs!'
  },
  {
    type: 'fill',
    badge: '📝 Fill In',
    question: 'The hollow parts inside the heart are called ______.',
    answer: 'chambers',
    altAnswers: ['chamber'],
    feedback: 'The CHAMBERS are the hollow rooms inside your heart — there are 4 of them! 🏠🫀',
    hint: 'Your heart has 4 of these hollow spaces!'
  }
];

// Shuffle questions
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffledQ, currentIndex, correctCount, stars, answered;

function init() {
  shuffledQ = shuffle(questions);
  currentIndex = 0;
  correctCount = 0;
  stars = 0;
  answered = false;
  updateScoreBar();
  renderQuestion();
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
}

function updateScoreBar() {
  document.getElementById('starCount').textContent = stars;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('totalCount').textContent = `${currentIndex}/${shuffledQ.length}`;
  document.getElementById('progressBar').style.width = `${(currentIndex / shuffledQ.length) * 100}%`;
}

function renderQuestion() {
  answered = false;
  const q = shuffledQ[currentIndex];
  document.getElementById('questionBadge').textContent = q.badge + '  Question ' + (currentIndex + 1) + ' of ' + shuffledQ.length;
  document.getElementById('questionText').textContent = q.question;

  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback';
  document.getElementById('nextBtn').className = 'next-btn';

  // Animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';

  const area = document.getElementById('answerArea');
  area.innerHTML = '';

  if (q.type === 'mc') {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    const letters = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
      btn.onclick = () => selectMC(i);
      grid.appendChild(btn);
    });
    area.appendChild(grid);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'fill-input-wrap';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'fill-input';
    input.placeholder = 'Type your answer here...';
    input.id = 'fillInput';
    input.onkeydown = (e) => { if (e.key === 'Enter') checkFill(); };
    wrap.appendChild(input);
    area.appendChild(wrap);

    const subBtn = document.createElement('button');
    subBtn.className = 'submit-btn';
    subBtn.textContent = '✅ Check Answer';
    subBtn.onclick = checkFill;
    area.appendChild(subBtn);
  }

  // Hint button
  const hintBtn = document.createElement('button');
  hintBtn.className = 'hint-btn';
  hintBtn.textContent = '💡 Hint';
  const hintText = document.createElement('div');
  hintText.className = 'hint-text';
  hintText.textContent = '💡 ' + q.hint;
  hintBtn.onclick = () => hintText.classList.toggle('show');
  area.appendChild(hintBtn);
  area.appendChild(hintText);

  updateScoreBar();
}

function selectMC(idx) {
  if (answered) return;
  answered = true;
  const q = shuffledQ[currentIndex];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  if (idx === q.answer) {
    btns[idx].classList.add('correct');
    showFeedback(true, '⭐ Correct! ' + q.feedback);
    correctCount++;
    stars++;
    sparkleEffect();
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    showFeedback(false, '❌ Not quite! The answer was: ' + q.options[q.answer] + '. ' + q.feedback);
  }
  document.getElementById('nextBtn').classList.add('show');
  updateScoreBar();
}

function checkFill() {
  if (answered) return;
  const q = shuffledQ[currentIndex];
  const input = document.getElementById('fillInput');
  const userAns = input.value.trim().toLowerCase();
  const correct = q.answer.toLowerCase();
  const alts = (q.altAnswers || []).map(a => a.toLowerCase());

  answered = true;
  input.disabled = true;

  if (userAns === correct || alts.includes(userAns)) {
    input.classList.add('correct');
    showFeedback(true, '⭐ Correct! ' + q.feedback);
    correctCount++;
    stars++;
    sparkleEffect();
  } else {
    input.classList.add('wrong');
    showFeedback(false, `❌ Not quite! The answer is: "${q.answer}". ${q.feedback}`);
  }
  document.getElementById('nextBtn').classList.add('show');
  updateScoreBar();
}

function showFeedback(isCorrect, text) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  document.getElementById('feedbackIcon').textContent = isCorrect ? '🎉' : '💙';
  document.getElementById('feedbackText').textContent = text;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffledQ.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  const result = document.getElementById('resultScreen');
  result.classList.add('show');
  updateScoreBar();

  const pct = Math.round((correctCount / shuffledQ.length) * 100);
  document.getElementById('resultScore').textContent = `${correctCount} / ${shuffledQ.length}`;

  let emoji, title, msg, starStr;
  if (pct === 100) {
    emoji = '🏆'; title = 'PERFECT SCORE!'; msg = 'You\'re a Health superstar, Max! Amazing job! 🌟';
    starStr = '⭐⭐⭐⭐⭐';
    document.getElementById('resultScore').style.color = '#FFD700';
    launchConfetti();
  } else if (pct >= 80) {
    emoji = '🎉'; title = 'Great Job!'; msg = 'You know your circulatory system really well! Keep it up! 💪';
    starStr = '⭐⭐⭐⭐';
    document.getElementById('resultScore').style.color = '#2ECC71';
  } else if (pct >= 60) {
    emoji = '👍'; title = 'Good Try!'; msg = 'You\'re learning! Review the tricky ones and try again! 📖';
    starStr = '⭐⭐⭐';
    document.getElementById('resultScore').style.color = '#2ED4FF';
  } else {
    emoji = '💪'; title = 'Keep Studying!'; msg = 'No worries — practice makes perfect! Try again! 🔄';
    starStr = '⭐⭐';
    document.getElementById('resultScore').style.color = '#FF8C00';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultStars').textContent = starStr;
}

function restartQuiz() {
  document.getElementById('resultScreen').classList.remove('show');
  init();
}

function sparkleEffect() {
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.textContent = ['⭐','✨','💫','🌟'][Math.floor(Math.random()*4)];
      el.style.cssText = `position:fixed;font-size:1.5rem;pointer-events:none;z-index:999;
        left:${20+Math.random()*60}%;top:${20+Math.random()*50}%;
        animation:confettiFall 1s ease forwards;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }, i * 60);
  }
}

function launchConfetti() {
  const colors = ['#FFD700','#FF4757','#2ED4FF','#2ECC71','#A855F7','#FF8C00'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${6+Math.random()*10}px;
        height:${6+Math.random()*10}px;
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${2+Math.random()*2}s;
        animation-delay:${Math.random()*1}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// Floating background hearts
function createBgHearts() {
  const container = document.getElementById('bgHearts');
  const emojis = ['🫀','❤️','🩸','💉','🩺','⭐'];
  for (let i = 0; i < 15; i++) {
    const el = document.createElement('div');
    el.className = 'bg-heart';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.cssText = `
      left:${Math.random()*100}%;
      animation-duration:${12+Math.random()*18}s;
      animation-delay:${Math.random()*15}s;
      font-size:${20+Math.random()*20}px;
    `;
    container.appendChild(el);
  }
}

createBgHearts();
init();
</script>
</body>
</html>
