<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Quiz · Ch.11 🍁</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #1a0a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .screen { display: none; width: 100%; max-width: 680px; }
  .screen.active { display: block; }

  /* START */
  #start { background: #2a0a4e; border-radius: 28px; padding: 40px 28px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
  .maple { font-size: 64px; display: block; margin-bottom: 12px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  h1 { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#FFF8E7; line-height:1.1; margin-bottom:6px; }
  .subtitle { color:#b388ff; font-weight:700; font-size:0.95rem; letter-spacing:1px; margin-bottom:28px; }
  .mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; }
  .mode-card { background:#3a1a5e; border:2px solid #6a3a9e; border-radius:16px; padding:14px 12px; cursor:pointer; transition:all 0.18s; text-align:center; }
  .mode-card:hover { background:#4a2a7e; border-color:#b388ff; transform:translateY(-2px); }
  .mode-card.active { background:#7c4dff; border-color:#7c4dff; }
  .mc { font-family:'Fredoka One',cursive; font-size:0.95rem; color:#e0c8ff; margin-bottom:4px; }
  .md { font-size:0.72rem; color:#9e7acc; font-weight:600; }
  .mode-card.active .mc { color:#fff; }
  .mode-card.active .md { color:#ddd; }
  .btn-start { background:#7c4dff; color:white; border:none; padding:16px 48px; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1.4rem; cursor:pointer; box-shadow:0 6px 0 #4a2a9e; transition:all 0.15s; }
  .btn-start:hover { transform:translateY(-3px); box-shadow:0 9px 0 #4a2a9e; }
  .btn-start:active { transform:translateY(3px); box-shadow:0 2px 0 #4a2a9e; }

  /* QUIZ */
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .q-counter { color:rgba(255,255,255,0.5); font-weight:700; font-size:0.85rem; letter-spacing:1px; }
  .btn-home-top { background:#3a1a5e; color:#b388ff; border:1.5px solid #6a3a9e; padding:6px 14px; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.8rem; cursor:pointer; transition:all 0.18s; }
  .btn-home-top:hover { color:#fff; border-color:#b388ff; }
  .progress-wrap { background:rgba(255,255,255,0.12); border-radius:8px; height:8px; margin-bottom:18px; }
  .progress-bar { background:linear-gradient(90deg,#b388ff,#7c4dff); height:100%; border-radius:8px; transition:width 0.4s ease; }
  .card { background:#FFF8E7; border-radius:22px; padding:28px 24px; box-shadow:0 6px 28px rgba(0,0,0,0.4); position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg,#7c4dff,#ff6d00); }
  .section-badge { display:inline-block; background:#7c4dff; color:white; padding:3px 12px; border-radius:20px; font-size:0.72rem; font-weight:800; letter-spacing:1px; margin-bottom:6px; }
  .type-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.68rem; font-weight:800; letter-spacing:1px; margin-bottom:14px; margin-left:6px; }
  .type-mc { background:#ff6d00; color:white; }
  .type-sa { background:#2ECC71; color:white; }
  .q-text { font-size:1.05rem; font-weight:800; color:#1a1a2e; line-height:1.5; margin-bottom:20px; }

  /* MC */
  .options { display:flex; flex-direction:column; gap:10px; }
  .opt { background:white; border:2.5px solid #e0d5c0; border-radius:14px; padding:13px 16px; text-align:left; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.95rem; color:#1a1a2e; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:10px; }
  .opt:hover:not([disabled]) { border-color:#7c4dff; background:#f5f0ff; transform:translateX(3px); }
  .opt .ltr { width:30px; height:30px; border-radius:50%; background:#f0e8d5; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; }
  .opt.correct { background:#d4f5e2; border-color:#2ECC71; }
  .opt.correct .ltr { background:#2ECC71; color:white; }
  .opt.wrong { background:#fde8e8; border-color:#E74C3C; }
  .opt.wrong .ltr { background:#E74C3C; color:white; }

  /* SHORT ANSWER */
  .write-wrap { display:flex; flex-direction:column; gap:12px; }
  .write-input { border:2.5px solid #e0d5c0; border-radius:14px; padding:14px 18px; font-family:'Nunito',sans-serif; font-weight:700; font-size:1rem; color:#1a1a2e; outline:none; transition:all 0.15s; background:white; width:100%; }
  .write-input:focus { border-color:#7c4dff; background:#f5f0ff; }
  .write-input:disabled { background:#f5f5f5; color:#888; }
  .btn-submit { background:#7c4dff; color:white; border:none; padding:14px; border-radius:14px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all 0.15s; }
  .btn-submit:hover { background:#5c2ddf; transform:translateY(-2px); }
  .selfcheck { display:none; flex-direction:column; gap:10px; }
  .selfcheck.show { display:flex; animation:fadeIn 0.25s ease; }
  .answer-reveal { background:#2a0a4e; color:#b388ff; border-radius:12px; padding:12px 16px; font-weight:800; font-size:0.95rem; }
  .answer-reveal span { color:#fff; font-weight:600; }
  .check-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn-got-it { background:#2ECC71; color:white; border:none; padding:13px; border-radius:14px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all 0.15s; }
  .btn-got-it:hover { background:#27AE60; transform:translateY(-2px); }
  .btn-missed { background:#E74C3C; color:white; border:none; padding:13px; border-radius:14px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all 0.15s; }
  .btn-missed:hover { background:#c0392b; transform:translateY(-2px); }

  .feedback { margin-top:16px; padding:13px 16px; border-radius:12px; font-weight:700; font-size:0.9rem; line-height:1.5; display:none; }
  .feedback.show { display:block; animation:fadeIn 0.25s ease; }
  .feedback.ok { background:#d4f5e2; color:#1a6b38; border:2px solid #2ECC71; }
  .feedback.bad { background:#fde8e8; color:#8B0000; border:2px solid #E74C3C; }

  .nav { display:flex; gap:10px; margin-top:14px; }
  .btn-back { background:#3a1a5e; color:white; border:none; padding:13px 20px; border-radius:14px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
  .btn-back:hover { background:#4a2a7e; transform:translateY(-2px); }
  .btn-back:disabled { opacity:0.3; cursor:default; transform:none; }
  .btn-next { flex:1; background:#3a1a5e; color:white; border:none; padding:13px; border-radius:14px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all 0.15s; display:none; }
  .btn-next.show { display:block; animation:fadeIn 0.25s ease; }
  .btn-next:hover { background:#7c4dff; transform:translateY(-2px); }

  /* RESULT */
  #result { background:#FFF8E7; border-radius:24px; padding:36px 28px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .result-emoji { font-size:3rem; display:block; margin-bottom:16px; }
  .score-ring { width:130px; height:130px; border-radius:50%; background:#2a0a4e; border:6px solid #b388ff; margin:0 auto 20px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score-num { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#b388ff; line-height:1; }
  .score-lbl { color:rgba(255,255,255,0.5); font-size:0.75rem; font-weight:700; }
  .result-title { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#1a1a2e; margin-bottom:6px; }
  .result-msg { color:#666; font-weight:600; font-size:0.95rem; margin-bottom:24px; }
  .result-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
  .btn-retry { background:#7c4dff; color:white; border:none; padding:13px 24px; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; box-shadow:0 4px 0 #4a2a9e; transition:all 0.15s; }
  .btn-retry:hover { transform:translateY(-2px); }
  .btn-home { background:#3a1a5e; color:white; border:none; padding:13px 24px; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all 0.15s; }
  .btn-home:hover { background:#4a2a7e; transform:translateY(-2px); }
  .review { text-align:left; display:flex; flex-direction:column; gap:7px; }
  .review-item { padding:10px 14px; border-radius:10px; font-size:0.85rem; font-weight:600; display:flex; align-items:flex-start; gap:8px; }
  .review-item.ok { background:#d4f5e2; color:#1a6b38; }
  .review-item.miss { background:#fde8e8; color:#8B0000; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="start" class="screen active">
  <span class="maple">⚔️</span>
  <h1>History Quiz</h1>
  <p class="subtitle">Chapter 11 · Modern Canada</p>
  <div class="mode-grid">
    <div class="mode-card active" data-mode="all" onclick="selectMode(this)">
      <div class="mc">📚 All Sections</div>
      <div class="md">11.1 + 11.2 + 11.3</div>
    </div>
    <div class="mode-card" data-mode="11.1" onclick="selectMode(this)">
      <div class="mc">🪖 11.1 World War I</div>
      <div class="md">9 questions</div>
    </div>
    <div class="mode-card" data-mode="11.2" onclick="selectMode(this)">
      <div class="mc">📉 11.2 Ups & Downs</div>
      <div class="md">7 questions</div>
    </div>
    <div class="mode-card" data-mode="11.3" onclick="selectMode(this)">
      <div class="mc">💣 11.3 World War II</div>
      <div class="md">13 questions</div>
    </div>
  </div>
  <button class="btn-start" id="btn-start">▶ Start!</button>
</div>

<div id="quiz" class="screen">
  <div class="top-bar">
    <span class="q-counter" id="q-counter">1 / 29</span>
    <button class="btn-home-top" id="btn-home-top">🏠 Home</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="card">
    <span class="section-badge" id="section-badge">11.1</span>
    <span class="type-badge" id="type-badge">MC</span>
    <p class="q-text" id="q-text"></p>
    <div id="answer-area"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav">
      <button class="btn-back" id="btn-back">← Back</button>
      <button class="btn-next" id="btn-next">Next →</button>
    </div>
  </div>
</div>

<div id="result" class="screen">
  <span class="result-emoji" id="r-emoji">🏆</span>
  <div class="score-ring">
    <span class="score-num" id="r-score">0/0</span>
    <span class="score-lbl">SCORE</span>
  </div>
  <h2 class="result-title" id="r-title">Amazing!</h2>
  <p class="result-msg" id="r-msg"></p>
  <div class="result-btns">
    <button class="btn-retry" id="btn-retry">🔄 Try Again</button>
    <button class="btn-home" id="btn-home">🏠 Home</button>
  </div>
  <div class="review" id="review"></div>
</div>

<script>
// t:'mc' = multiple choice, t:'sa' = short answer (self-check)
var QS = [
  // ── 11.1 WWI ──
  {s:'11.1',t:'mc',
   q:'How did World War I begin?',
   o:['Germany invaded France','Archduke Franz Ferdinand was murdered by a Serbian','Britain attacked Austria','Canada declared war first'],
   a:1, e:'Archduke Franz Ferdinand, heir to the Austro-Hungarian throne, was murdered by a Serbian. This caused Austria to attack Serbia and other countries chose sides.'},
  {s:'11.1',t:'sa',
   q:'Why did Canada join World War I?',
   a:'Canada supported Britain\'s decision and joined as part of the Allied forces when Britain declared war.'},
  {s:'11.1',t:'mc',
   q:'How many Canadians went to fight in World War I?',
   o:['30,000','125,000','425,000','625,000'],
   a:3, e:'Between 1914 and 1918, Canada sent 625,000 men and women to fight in the war.'},
  {s:'11.1',t:'sa',
   q:'What is conscription?',
   a:'Forcing men to join the army.'},
  {s:'11.1',t:'mc',
   q:'Who was against conscription?',
   o:['Doctors and nurses','Farmers, Quakers, and Mennonites','Teachers and politicians','Businessmen and factory owners'],
   a:1, e:'Farmers did not want their sons taken from the farms. Quakers and Mennonites were against it because they believed war was evil.'},
  {s:'11.1',t:'sa',
   q:'What famous poem was written after the Second Battle of Ypres, and who wrote it?',
   a:'In Flanders Fields, written by Lieutenant Colonel John McCrae.'},
  {s:'11.1',t:'mc',
   q:'What was one of the worst battles Canadians fought in during WWI?',
   o:['Battle of Dieppe','Battle of Ypres','Battle of Vimy Ridge','Battle of Normandy'],
   a:1, e:'The Battle of Ypres on April 22, 1915 was one of the worst. The Germans used poison gas and over 100 Canadians were killed.'},
  {s:'11.1',t:'sa',
   q:'When did WWI end?',
   a:'November 11, 1918.'},
  {s:'11.1',t:'mc',
   q:'What peacekeeping force did Canada join after WWI?',
   o:['The United Nations','The Imperial War Cabinet','The League of Nations','The Allied Forces'],
   a:2, e:'Canada was allowed to join the League of Nations, a world peacekeeping force.'},

  // ── 11.2 UPS AND DOWNS ──
  {s:'11.2',t:'sa',
   q:'What do historians call the 1920s?',
   a:'The Roaring Twenties.'},
  {s:'11.2',t:'mc',
   q:'What caused the Great Depression?',
   o:['A world war broke out','The New York Stock Market Crash in October 1929','A drought across all of Canada','A banking collapse in Britain'],
   a:1, e:'The Depression was caused by the New York Stock Market Crash in October 1929. People who invested in stocks lost all their money.'},
  {s:'11.2',t:'sa',
   q:'What percent of the population did not have jobs by 1933?',
   a:'30%'},
  {s:'11.2',t:'mc',
   q:'What did Alberta and Saskatchewan suffer from at the same time as the Great Depression?',
   o:['Floods','Severe drought and crop failure','An earthquake','A forest fire'],
   a:1, e:'Alberta and Saskatchewan suffered a severe drought which led to crop failure. Farms lost about 75% of their income.'},
  {s:'11.2',t:'sa',
   q:'What became the favourite pastime of housewives during the Depression?',
   a:'Window shopping.'},
  {s:'11.2',t:'mc',
   q:'What form of entertainment became very popular during the Depression?',
   o:['Movies','Radio shows','Theatre','Street performances'],
   a:1, e:'Radio shows became very popular as a way to cope and be entertained during the Great Depression.'},
  {s:'11.2',t:'sa',
   q:'What two famous Canadian companies were started during the 1930s?',
   a:'The Canadian Broadcasting Corporation (CBC) and Trans-Canada Airline (Air Canada).'},

  // ── 11.3 WWII ──
  {s:'11.3',t:'sa',
   q:'Who was the leader (dictator) of Italy?',
   a:'Benito Mussolini.'},
  {s:'11.3',t:'mc',
   q:'What is a dictator?',
   o:['An elected president','Someone who rules with almost unlimited power','A military general','A prime minister with extra powers'],
   a:1, e:'A dictator is someone who rules with almost unlimited power.'},
  {s:'11.3',t:'sa',
   q:'What was the purpose of the Treaty of Versailles?',
   a:'To prevent Germany from ever starting another war.'},
  {s:'11.3',t:'mc',
   q:'Who was the leader of Germany during WWII?',
   o:['Joseph Stalin','Benito Mussolini','Kaiser Wilhelm','Adolf Hitler'],
   a:3, e:'Adolf Hitler became the dictator of Germany after being elected in 1933 and disbanding the German government (Reichstag).'},
  {s:'11.3',t:'sa',
   q:'Who was part of the Rome-Berlin Axis?',
   a:'Germany and Italy.'},
  {s:'11.3',t:'mc',
   q:'What area did Germany march soldiers into, breaking the Treaty of Versailles?',
   o:['Poland','Austria','The Rhineland','Czechoslovakia'],
   a:2, e:'In March 1936, Hitler marched his men into the Rhineland, which Germany was forced to vacate under the Treaty of Versailles.'},
  {s:'11.3',t:'sa',
   q:'After Germany invaded ___, Britain and France declared war on Germany.',
   a:'Poland.'},
  {s:'11.3',t:'mc',
   q:'When did Canada officially declare war in WWII?',
   o:['September 1, 1939','September 3, 1939','September 10, 1939','October 3, 1939'],
   a:2, e:'Canada officially declared war on September 10, 1939.'},
  {s:'11.3',t:'sa',
   q:'What place did Japan bomb on December 7, 1941, bringing the USA into the war?',
   a:'Pearl Harbour.'},
  {s:'11.3',t:'mc',
   q:'In what battle were 907 Canadians killed, 500+ wounded, and 2,000 captured?',
   o:['Battle of Ypres','Battle of Vimy Ridge','Battle of Dieppe','Battle of Juno Beach'],
   a:2, e:'The Battle of Dieppe in August 1942 was a terrible loss — 907 died, 500+ wounded, almost 2,000 captured as prisoners of war.'},
  {s:'11.3',t:'sa',
   q:'What was the name of the Allied invasion to take back Europe from Germany?',
   a:'Operation D-Day.'},
  {s:'11.3',t:'mc',
   q:'What is VE Day?',
   o:['The day Japan surrendered','The day Canada joined the war','Victory in Europe Day — when Germany surrendered on May 7, 1945','The day the atomic bomb was dropped'],
   a:2, e:'VE Day is Victory in Europe Day — May 7, 1945, when Germany surrendered to the Allied forces.'},
  {s:'11.3',t:'sa',
   q:'What two Japanese cities were attacked with atomic bombs?',
   a:'Hiroshima (August 6, 1945) and Nagasaki (August 9, 1945).'}
];

var pool=[], idx=0, score=0, answered=false, log=[], mode='all';

function selectMode(el) {
  document.querySelectorAll('.mode-card').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  mode=el.dataset.mode;
}
function shuffle(arr) {
  var a=arr.slice(),i,j,tmp;
  for(i=a.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}
function goHome() {
  pool=[];idx=0;score=0;log=[];answered=false;
  showScreen('start');
}

document.getElementById('btn-start').addEventListener('click',function(){
  var src=mode==='all'?QS:QS.filter(function(q){return q.s===mode;});
  pool=shuffle(src); idx=0; score=0; log=[]; answered=false;
  showScreen('quiz'); render();
});

function render() {
  var q=pool[idx];
  answered=false;
  document.getElementById('q-counter').textContent=(idx+1)+' / '+pool.length;
  document.getElementById('progress-bar').style.width=(idx/pool.length*100)+'%';
  document.getElementById('section-badge').textContent='Section '+q.s;
  var tb=document.getElementById('type-badge');
  if(q.t==='mc'){ tb.textContent='Multiple Choice'; tb.className='type-badge type-mc'; }
  else { tb.textContent='Short Answer'; tb.className='type-badge type-sa'; }
  document.getElementById('q-text').textContent=q.q;
  var fb=document.getElementById('feedback');
  fb.className='feedback'; fb.textContent='';
  var nb=document.getElementById('btn-next');
  nb.className='btn-next';
  nb.textContent=idx===pool.length-1?'🏁 See Results!':'Next →';
  document.getElementById('btn-back').disabled=(idx===0);
  var area=document.getElementById('answer-area');
  area.innerHTML='';

  if(q.t==='mc') {
    var wrap=document.createElement('div');
    wrap.className='options';
    ['A','B','C','D'].forEach(function(ltr,i){
      var btn=document.createElement('button');
      btn.className='opt';
      btn.innerHTML='<span class="ltr">'+ltr+'</span>'+q.o[i];
      btn.onclick=(function(i){return function(){checkMC(i);};})(i);
      wrap.appendChild(btn);
    });
    area.appendChild(wrap);
  } else {
    var wrap=document.createElement('div');
    wrap.className='write-wrap';
    var inp=document.createElement('input');
    inp.type='text'; inp.className='write-input'; inp.id='write-input';
    inp.placeholder='Type your answer here...';
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter') submitSA(); });
    var sub=document.createElement('button');
    sub.className='btn-submit'; sub.textContent='Check Answer ✓';
    sub.addEventListener('click', submitSA);
    var sc=document.createElement('div');
    sc.className='selfcheck'; sc.id='selfcheck';
    var ar=document.createElement('div');
    ar.className='answer-reveal'; ar.id='answer-reveal';
    var cb=document.createElement('div');
    cb.className='check-btns';
    var bg=document.createElement('button');
    bg.className='btn-got-it'; bg.textContent='✅ I got it!';
    bg.addEventListener('click',function(){ markSA(true); });
    var bm=document.createElement('button');
    bm.className='btn-missed'; bm.textContent='❌ I missed it';
    bm.addEventListener('click',function(){ markSA(false); });
    cb.appendChild(bg); cb.appendChild(bm);
    sc.appendChild(ar); sc.appendChild(cb);
    wrap.appendChild(inp); wrap.appendChild(sub); wrap.appendChild(sc);
    area.appendChild(wrap);
    setTimeout(function(){ var el=document.getElementById('write-input'); if(el) el.focus(); },100);
  }
}

function checkMC(chosen) {
  if(answered)return; answered=true;
  var q=pool[idx];
  var btns=document.querySelectorAll('.opt');
  for(var i=0;i<btns.length;i++) btns[i].setAttribute('disabled','true');
  var ok=chosen===q.a;
  btns[chosen].classList.add(ok?'correct':'wrong');
  if(!ok) btns[q.a].classList.add('correct');
  record(ok, ok?'🎉 Correct! '+q.e:'❌ Not quite. '+q.e);
}

function submitSA() {
  if(answered)return;
  var inp=document.getElementById('write-input');
  if(!inp||!inp.value.trim())return;
  inp.disabled=true;
  document.querySelector('.btn-submit').style.display='none';
  document.getElementById('answer-reveal').innerHTML='Answer: <span>'+pool[idx].a+'</span>';
  document.getElementById('selfcheck').className='selfcheck show';
  answered=true;
}

function markSA(ok) {
  record(ok, ok?'🎉 Great job!':'📖 Review this one!');
  document.querySelector('.check-btns').style.display='none';
}

function record(ok, msg) {
  if(log.length<=idx){ log.push({q:pool[idx].q,ok:ok}); if(ok)score++; }
  else { var old=log[idx]; if(old.ok!==ok){if(old.ok)score--;if(ok)score++;log[idx]={q:pool[idx].q,ok:ok};} }
  var fb=document.getElementById('feedback');
  fb.textContent=msg;
  fb.className='feedback show '+(ok?'ok':'bad');
  document.getElementById('btn-next').className='btn-next show';
}

document.getElementById('btn-next').addEventListener('click',function(){
  if(!answered)return;
  idx++; if(idx>=pool.length) showResult(); else render();
});
document.getElementById('btn-back').addEventListener('click',function(){
  if(idx<=0)return;
  if(answered&&log.length>idx){var e=log.pop();if(e.ok)score--;}
  idx--;
  if(log.length>idx){var p=log.pop();if(p.ok)score--;}
  render();
});
document.getElementById('btn-home-top').addEventListener('click',goHome);
document.getElementById('btn-home').addEventListener('click',goHome);
document.getElementById('btn-retry').addEventListener('click',function(){
  idx=0;score=0;log=[];answered=false;pool=shuffle(pool);
  showScreen('quiz'); render();
});

function showResult(){
  document.getElementById('progress-bar').style.width='100%';
  showScreen('result');
  var pct=score/pool.length;
  document.getElementById('r-score').textContent=score+'/'+pool.length;
  var emoji,title,msg;
  if(pct===1){emoji='🏆';title='PERFECT SCORE!';msg='You crushed it! History champion! 🍁';}
  else if(pct>=.8){emoji='🌟';title='Excellent!';msg='Almost perfect — great work!';}
  else if(pct>=.6){emoji='👍';title='Good Job!';msg='Solid! Review the missed ones.';}
  else if(pct>=.4){emoji='📚';title='Keep Studying!';msg='Read the chapter again and retry!';}
  else{emoji='⚔️';title='Study More!';msg='Don\'t give up! Review and try again.';}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-msg').textContent=msg;
  var html='';
  for(var i=0;i<log.length;i++){
    html+='<div class="review-item '+(log[i].ok?'ok':'miss')+'">';
    html+='<span>'+(log[i].ok?'✅':'❌')+'</span><span>'+log[i].q+'</span></div>';
  }
  document.getElementById('review').innerHTML=html;
}
</script>
</body>
</html>
