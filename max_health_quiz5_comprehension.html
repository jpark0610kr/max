<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max's Health Quiz 5 - Comprehension! 🥗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
    background: linear-gradient(160deg, #1E3A5F 0%, #1E4D8C 40%, #0A1929 100%);
    min-height: 100%; color: #fff;
  }
  body { min-height: 100vh; padding-bottom: 40px; }
  .container { max-width: 820px; margin: 0 auto; padding: 20px; }

  .header { text-align: center; padding: 28px 0 16px; }
  .header h1 {
    font-family: 'Fredoka One', 'Comic Sans MS', cursive;
    font-size: clamp(1.9rem, 5.5vw, 3rem);
    color: #93C5FD;
    text-shadow: 3px 3px 0 #1E3A5F, 0 0 30px rgba(147,197,253,0.4);
  }
  .header p { color: #60A5FA; font-size: 0.95rem; font-weight: 700; margin-top: 6px; letter-spacing: 1px; }

  .score-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.12);
    border-radius: 18px; padding: 12px 22px; margin-bottom: 16px;
  }
  .score-item { text-align: center; }
  .score-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.45); font-weight: 700; }
  .score-value { font-family: 'Fredoka One', 'Comic Sans MS', cursive; font-size: 1.7rem; line-height: 1; margin-top: 2px; }
  .score-item.stars .score-value { color: #FFD700; }
  .score-item.correct .score-value { color: #86EFAC; }
  .score-item.total .score-value { color: #93C5FD; }

  .progress-wrap { background: rgba(0,0,0,0.3); border-radius: 50px; height: 10px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #93C5FD, #60A5FA); border-radius: 50px; transition: width 0.5s ease; }

  .question-card {
    background: rgba(0,0,0,0.35); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 26px; margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideIn { from{transform:translateY(24px) scale(0.96);opacity:0;} to{transform:translateY(0) scale(1);opacity:1;} }

  .q-num { font-family: 'Fredoka One', 'Comic Sans MS', cursive; font-size: 0.72rem; color: rgba(255,255,255,0.38); margin-bottom: 4px; letter-spacing: 1px; }
  .ch-badge {
    display: inline-block; font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.5px; padding: 4px 12px; border-radius: 50px; margin-bottom: 12px;
  }
  .sec52 { background: #FCD34D; color: #78350F; }
  .sec53 { background: #86EFAC; color: #14532D; }
  .sec54 { background: #F9A8D4; color: #831843; }
  .sec55 { background: #93C5FD; color: #1E3A5F; }

  .question-text { font-size: clamp(1rem, 2.8vw, 1.22rem); font-weight: 800; color: #fff; line-height: 1.6; margin-bottom: 20px; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }
  .option-btn {
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12);
    border-radius: 13px; padding: 13px 14px; color: #fff;
    font-family: 'Nunito', Arial, sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 10px;
  }
  .option-btn:hover:not(:disabled) { background: rgba(147,197,253,0.15); border-color: #93C5FD; transform: translateY(-2px); }
  .option-btn .letter {
    width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', 'Comic Sans MS', cursive; font-size: 0.9rem; flex-shrink: 0;
  }
  .option-btn.correct { background: rgba(74,222,128,0.2); border-color: #4ADE80; }
  .option-btn.correct .letter { background: #4ADE80; color: #14532D; }
  .option-btn.wrong { background: rgba(248,113,113,0.2); border-color: #F87171; animation: shake 0.4s; }
  .option-btn.wrong .letter { background: #F87171; color: white; }
  .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }

  .tf-wrap { display: flex; gap: 12px; }
  .tf-btn {
    flex: 1; background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12);
    border-radius: 13px; padding: 14px; color: white;
    font-family: 'Fredoka One', 'Comic Sans MS', cursive; font-size: 1.2rem; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .tf-btn.true-btn:hover:not(:disabled) { background: rgba(74,222,128,0.15); border-color: #4ADE80; }
  .tf-btn.false-btn:hover:not(:disabled) { background: rgba(248,113,113,0.15); border-color: #F87171; }
  .tf-btn.correct { background: rgba(74,222,128,0.2); border-color: #4ADE80; animation: correctPulse 0.5s; }
  .tf-btn.wrong { background: rgba(248,113,113,0.2); border-color: #F87171; animation: shake 0.4s; }
  .tf-btn:disabled { cursor: not-allowed; opacity: 0.7; }
  @keyframes correctPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.03);} }

  .feedback {
    margin-top: 12px; padding: 12px 16px; border-radius: 12px;
    font-weight: 700; font-size: 0.92rem; display: none; align-items: flex-start; gap: 9px; line-height: 1.5;
  }
  .feedback.show { display: flex; animation: fadeIn 0.3s ease; }
  .feedback.correct-fb { background: rgba(74,222,128,0.13); border: 2px solid rgba(74,222,128,0.35); color: #BBF7D0; }
  .feedback.wrong-fb   { background: rgba(248,113,113,0.13); border: 2px solid rgba(248,113,113,0.35); color: #FECACA; }
  .feedback-icon { font-size: 1.3rem; flex-shrink: 0; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:translateY(0);} }

  .hint-btn {
    background: none; border: 2px solid rgba(255,215,0,0.35); border-radius: 50px;
    padding: 5px 13px; color: #FFD700; font-family: 'Nunito', Arial, sans-serif;
    font-size: 0.8rem; font-weight: 800; cursor: pointer; transition: all 0.2s; margin-top: 10px;
  }
  .hint-btn:hover { background: rgba(255,215,0,0.09); }
  .hint-text { margin-top: 6px; padding: 8px 12px; background: rgba(255,215,0,0.09); border-radius: 9px; color: #FFD700; font-size: 0.85rem; font-weight: 700; display: none; }
  .hint-text.show { display: block; animation: fadeIn 0.3s; }

  .next-btn {
    display: none; width: 100%; margin-top: 12px;
    background: linear-gradient(135deg, #FFD700, #F97316);
    border: none; border-radius: 13px; padding: 14px; color: #1E3A5F;
    font-family: 'Fredoka One', 'Comic Sans MS', cursive; font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
  }
  .next-btn.show { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .next-btn:hover { transform: translateY(-2px); }
  @keyframes popIn { from{transform:scale(0.8);opacity:0;} to{transform:scale(1);opacity:1;} }

  .result-screen { display: none; text-align: center; padding: 36px 16px; }
  .result-screen.show { display: block; animation: slideIn 0.5s ease; }
  .result-emoji { font-size: 4.5rem; margin-bottom: 16px; animation: bounce 1s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-14px);} }
  .result-title { font-family: 'Fredoka One', 'Comic Sans MS', cursive; font-size: clamp(2rem,6vw,2.8rem); margin-bottom: 8px; color: #93C5FD; }
  .result-score-big { font-family: 'Fredoka One', 'Comic Sans MS', cursive; font-size: clamp(3rem,9vw,4.5rem); line-height: 1; margin: 16px 0; color: #FFD700; }
  .result-msg { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.65); margin-bottom: 24px; }
  .stars-display { font-size: 2.2rem; margin: 6px 0 16px; }
  .restart-btn {
    background: linear-gradient(135deg, #A855F7, #6D28D9); border: none;
    border-radius: 16px; padding: 16px 40px; color: white;
    font-family: 'Fredoka One', 'Comic Sans MS', cursive; font-size: 1.3rem; cursor: pointer; transition: all 0.2s;
  }
  .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(168,85,247,0.4); }
  .confetti-piece { position: fixed; pointer-events: none; animation: confettiFall linear forwards; z-index: 9999; }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }
</style>
</head>

<div class="container">
  <div class="header">
    <h1>🥗 Health Quiz 5 — Comprehension!</h1>
    <p>5.2 Energy Nutrients · 5.3 Vitamins & Minerals · 5.4 Balanced Diet · 5.5 Food Labels & Safety</p>
  </div>

  <div class="score-bar" id="scoreBar">
    <div class="score-item stars"><div class="score-label">⭐ Stars</div><div class="score-value" id="starCount">0</div></div>
    <div class="score-item correct"><div class="score-label">✅ Correct</div><div class="score-value" id="correctCount">0</div></div>
    <div class="score-item total"><div class="score-label">📋 Total</div><div class="score-value" id="totalCount">0/28</div></div>
  </div>

    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="q-num" id="qNum">Q1 of 28</div>
    <div class="ch-badge sec52" id="chBadge">5.2 · Energy Nutrients</div>
    <div class="question-text" id="questionText"></div>
    <div id="answerArea"></div>
    <div class="feedback" id="feedback">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span id="feedbackText"></span>
    </div>

    <div class="result-title" id="resultTitle">Quiz Complete!</div>

    <div class="stars-display" id="resultStars"></div>
    <div class="result-msg" id="resultMsg"></div>

  </div>
</div>

<script>
const quizQ = [
  // ── 5.2 ENERGY NUTRIENTS ──
  {sec:'sec52',label:'5.2 · Energy Nutrients',type:'mc',
   q:'Which type of carbohydrate gives you LONGER-LASTING energy?',
   opts:['A candy bar','A sugary sports drink','Honey and syrup','A bowl of oatmeal or whole-grain bread'],
   ans:3,fb:'Healthy carbs like oatmeal and whole-grain bread give steady, long-lasting energy! Sugary foods cause a quick spike then a crash! 🌾',
   hint:'Think about which one keeps you going for hours!'},

  {sec:'sec52',label:'5.2 · Energy Nutrients',type:'mc',
   q:'What happens after a "SUGAR CRASH"?',
   opts:['You feel more energetic than ever','You feel exhausted, your mood may change, and it\'s hard to concentrate','Your body stores the sugar as muscle','You get an even bigger energy boost'],
   ans:1,fb:'A sugar crash leaves you feeling exhausted and moody — that\'s why healthy carbs are better for daily energy! 😴',
   hint:'Think about how you feel after too much candy!'},

  {sec:'sec52',label:'5.2 · Energy Nutrients',type:'tf',
   q:'TRUE or FALSE: Fats and oils provide MORE energy per gram than carbohydrates.',
   ans:true,fb:'TRUE! Fats provide twice as much energy as carbohydrates — but carbs are still your BEST daily energy source because they convert faster! 🧈',
   hint:'Which nutrient is more energy-dense per gram?'},

  {sec:'sec52',label:'5.2 · Energy Nutrients',type:'mc',
   q:'Why should your PRIMARY source of energy come from CARBOHYDRATES rather than fats?',
   opts:['Carbs taste better','Carbs have more calories','Carbs convert food into energy more quickly than fats','Fats are bad for you'],
   ans:2,fb:'Carbohydrates convert to energy faster than fats — that\'s why they\'re your body\'s go-to fuel! 🏃',
   hint:'Think about SPEED of converting food to energy!'},

  {sec:'sec52',label:'5.2 · Energy Nutrients',type:'tf',
   q:'TRUE or FALSE: Unsaturated fats are healthier than saturated fats and help prevent heart disease.',
   ans:true,fb:'TRUE! Unsaturated fats (from plants and fish) are the healthier choice — they help prevent heart disease and maintain healthy weight! 🥑',
   hint:'Think about which fats come from plants vs animals!'},

  {sec:'sec52',label:'5.2 · Energy Nutrients',type:'mc',
   q:'Water does not give energy, but what does it do for the body?',
   opts:['Nothing — it just tastes good','Protects organs, maintains temperature, enables joints to bend, and helps use nutrients','Provides carbohydrates for energy','Builds muscle tissue'],
   ans:1,fb:'Water does SO much — protects organs, maintains temperature, lubricates joints, and helps your body use nutrients and remove waste! 💧',
   hint:'Think about all the things water helps with!'},

  // ── 5.3 VITAMINS & MINERALS ──
  {sec:'sec53',label:'5.3 · Vitamins & Minerals',type:'mc',
   q:'Which vitamin would you get MORE of by playing outside on a sunny day?',
   opts:['Vitamin A','Vitamin C','Vitamin K','Vitamin D'],
   ans:3,fb:'VITAMIN D is the sunshine vitamin — your body makes it when sunlight hits your skin! Great reason to go outside! ☀️',
   hint:'It\'s called the "sunshine vitamin" for a reason!'},

  {sec:'sec53',label:'5.3 · Vitamins & Minerals',type:'mc',
   q:'You cut your finger and it stops bleeding. Which vitamin helped?',
   opts:['Vitamin A','Vitamin C','Vitamin K','Vitamin E'],
   ans:2,fb:'VITAMIN K helps your blood clot! K for Klotting! Found in dark leafy greens, chicken, and avocados! 🩹',
   hint:'Think K for Klotting!'},

  {sec:'sec53',label:'5.3 · Vitamins & Minerals',type:'mc',
   q:'You have a cold and want to help your body fight it. Which vitamin should you focus on?',
   opts:['Vitamin D','Vitamin K','Vitamin C','Vitamin E'],
   ans:2,fb:'VITAMIN C helps your immune system resist and fight infection! Load up on citrus fruits and bell peppers! 🍊',
   hint:'Think about which vitamin fights infections!'},

  {sec:'sec53',label:'5.3 · Vitamins & Minerals',type:'tf',
   q:'TRUE or FALSE: Calcium is the most common mineral found in the body and it makes bones and teeth strong.',
   ans:true,fb:'TRUE! Calcium is #1 most common mineral in your body — found in dairy, dark leafy greens, beans, and nuts! 🦷',
   hint:'Think about what makes bones strong!'},

  {sec:'sec53',label:'5.3 · Vitamins & Minerals',type:'mc',
   q:'Which mineral balances FLUIDS in the body and helps the CIRCULATORY SYSTEM?',
   opts:['Iron','Calcium','Iodine','Potassium'],
   ans:3,fb:'POTASSIUM balances fluids and helps your circulatory system! Bananas, oranges, and nuts are great sources! 🍌',
   hint:'Famous for being in bananas!'},

  {sec:'sec53',label:'5.3 · Vitamins & Minerals',type:'mc',
   q:'Which mineral does the THYROID GLAND need to do its job?',
   opts:['Iron','Calcium','Iodine','Magnesium'],
   ans:2,fb:'IODINE keeps your thyroid healthy! The thyroid affects how you grow and how your body functions. Found in iodized salt and seafood! 🦞',
   hint:'Found in iodized table salt!'},

  {sec:'sec53',label:'5.3 · Vitamins & Minerals',type:'mc',
   q:'During which SEASON might you need extra Vitamin D from food?',
   opts:['Summer — too much sun','Spring — flowers are blooming','Winter — less sunlight means your body makes less','Fall — leaves are falling'],
   ans:2,fb:'In WINTER there\'s less sunlight, so your body makes less Vitamin D! Eat more milk, cheese, fish, and egg yolks to make up for it! ❄️',
   hint:'Think about which season has the least sunlight!'},

  // ── 5.4 BALANCED DIET ──
  {sec:'sec54',label:'5.4 · Balanced Diet',type:'mc',
   q:'According to MyPlate, about how much of your daily food should be FRUITS and VEGETABLES?',
   opts:['About one quarter','About half','About three quarters','All of it'],
   ans:1,fb:'About HALF your plate should be fruits and vegetables — they\'re packed with vitamins, minerals, and fiber! 🥦🍎',
   hint:'Look at the MyPlate diagram — fruits + vegetables together!'},

  {sec:'sec54',label:'5.4 · Balanced Diet',type:'tf',
   q:'TRUE or FALSE: Vegetables have MORE sugar than fruits.',
   ans:false,fb:'FALSE! Vegetables actually have LESS sugar and usually MORE nutrients and fiber than fruits! 🥦',
   hint:'Which one is naturally sweeter?'},

  {sec:'sec54',label:'5.4 · Balanced Diet',type:'mc',
   q:'Why are WHOLE GRAINS healthier than REFINED grains?',
   opts:['They taste better','They are cheaper','They contain the bran and germ which have valuable fiber and nutrients','They cook faster'],
   ans:2,fb:'WHOLE GRAINS keep the bran and germ — where all the fiber and nutrients are! Refined grains have these removed. 🌾',
   hint:'Think about what parts are kept vs removed!'},

  {sec:'sec54',label:'5.4 · Balanced Diet',type:'mc',
   q:'Why are LEAN MEATS the best choice for daily protein?',
   opts:['They taste the best','They are easiest to cook','They have a lower fat content than other meats','They have the most calories'],
   ans:2,fb:'LEAN MEATS have less fat, making them a healthier daily protein choice! Chicken, fish, and turkey are great lean options! 🍗',
   hint:'Think about fat content!'},

  {sec:'sec54',label:'5.4 · Balanced Diet',type:'tf',
   q:'TRUE or FALSE: Low-fat dairy products are usually a better choice than full-fat dairy.',
   ans:true,fb:'TRUE! Low-fat milk, yogurt, and cheese are usually better because full-fat dairy is too rich for most people! 🥛',
   hint:'Think about what kind of dairy is healthiest!'},

  {sec:'sec54',label:'5.4 · Balanced Diet',type:'mc',
   q:'What should a GOOD BREAKFAST include?',
   opts:['Only sugar and caffeine','Protein, fruit, and whole grains','Just carbohydrates for quick energy','Only dairy products'],
   ans:1,fb:'A good breakfast = Protein + Fruit + Whole grains! This gives you steady energy and focus all morning! 🍳🍎🥣',
   hint:'Think protein + fruit + grains!'},

  {sec:'sec54',label:'5.4 · Balanced Diet',type:'mc',
   q:'What makes a GOOD SNACK?',
   opts:['High in sugar and salt for quick energy','Rich in nutrients and low in sugar and salt','Any food from the vending machine','Only sweet foods like candy'],
   ans:1,fb:'A good snack is RICH in nutrients and LOW in sugar and salt — fresh fruit, nuts, yogurt, or veggies! 🥕',
   hint:'Think about what gives you long-lasting energy!'},

  // ── 5.5 FOOD LABELS & SAFETY ──
  {sec:'sec55',label:'5.5 · Food Labels',type:'mc',
   q:'On a Nutrition Facts label, a daily percentage BELOW 5% means the food is:',
   opts:['High in that nutrient','A great source of that nutrient','Low in that nutrient','Dangerous to eat'],
   ans:2,fb:'Below 5% = LOW amount of that nutrient. Above 20% = HIGH amount! Use these percentages to make smart choices! 📊',
   hint:'5% is low, 20% is high!'},

  {sec:'sec55',label:'5.5 · Food Labels',type:'mc',
   q:'Which nutrients should you LIMIT in your diet?',
   opts:['Fiber, protein, vitamins, and minerals','Saturated fat, cholesterol, sodium, and added sugars','Potassium, calcium, and iron','Carbohydrates and water'],
   ans:1,fb:'Limit SATURATED FAT, CHOLESTEROL, SODIUM, and ADDED SUGARS — too much of these can harm your health! 🚫',
   hint:'Think about what can harm heart health!'},

  {sec:'sec55',label:'5.5 · Food Labels',type:'mc',
   q:'Ingredients on a food label are listed in what ORDER?',
   opts:['Alphabetical order','From smallest to largest amount','From largest to smallest amount — most first','By importance to nutrition'],
   ans:2,fb:'Ingredients are listed from MOST to LEAST — so if sugar is first, that\'s the biggest ingredient! Always check the top 3! 📋',
   hint:'Is the first ingredient the most or least?'},

  {sec:'sec55',label:'5.5 · Food Labels',type:'tf',
   q:'TRUE or FALSE: If a food has sugar as one of the first THREE ingredients, it is usually high in added sugars.',
   ans:true,fb:'TRUE! If sugar appears in the top 3 ingredients, that food is likely high in added sugars. Check the label! 🍬',
   hint:'Ingredients are listed by amount — most first!'},

  {sec:'sec55',label:'5.5 · Food Safety',type:'mc',
   q:'Why should frozen meats NOT be thawed at room temperature?',
   opts:['It changes the flavor','Pathogens can multiply at room temperature','It takes too long','The meat will freeze again'],
   ans:1,fb:'Thawing at room temperature lets pathogens MULTIPLY — always thaw in the refrigerator or microwave defrost setting! 🥩',
   hint:'Think about what grows in warm temperatures!'},

  {sec:'sec55',label:'5.5 · Food Safety',type:'mc',
   q:'How long can cooked or perishable food safely sit out of the refrigerator?',
   opts:['Up to 4 hours','Up to 6 hours','Up to 2 hours','Up to 8 hours'],
   ans:2,fb:'Only 2 HOURS! After that, perishable food is not safe to eat — put it back in the fridge after meals! ⏰',
   hint:'It\'s less than you might think!'},

  {sec:'sec55',label:'5.5 · Food Safety',type:'mc',
   q:'Which produce has the MOST nutrients?',
   opts:['Canned goods — they last longest','Frozen fruits and vegetables','Freshly picked produce','Produce that\'s been sitting for a week'],
   ans:2,fb:'FRESHLY PICKED produce has the most nutrients! The closer to harvest, the better. Frozen is a good option when fresh is unavailable! 🌽',
   hint:'Think about when produce is most fresh!'},

  {sec:'sec55',label:'5.5 · Food Safety',type:'tf',
   q:'TRUE or FALSE: Always wash your hands AND fresh fruits and vegetables before preparing food.',
   ans:true,fb:'TRUE! Wash your hands to remove pathogens AND wash fresh produce because pathogens and chemicals might be on them! 🧼',
   hint:'Two things to always wash before eating!'},
];

// VALIDATION
(function(){
  const errors=[];
  const mcErr=quizQ.filter(q=>q.type==='mc'&&q.opts.length!==4);
  const ansErr=quizQ.filter(q=>q.type==='mc'&&q.ans>=q.opts.length);
  const noHint=quizQ.filter(q=>!q.hint);
  const noFb=quizQ.filter(q=>!q.fb);
  if(mcErr.length)errors.push(`MC opts!=4: ${mcErr.length}`);
  if(ansErr.length)errors.push(`Ans out of range: ${ansErr.length}`);
  if(noHint.length)errors.push(`No hint: ${noHint.length}`);
  if(noFb.length)errors.push(`No feedback: ${noFb.length}`);
  if(errors.length)console.warn('ERRORS:',errors);
  else console.log(`✅ Validation passed: ${quizQ.length} questions`);
})();

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let shuffledQ,qIdx,correct,stars,answered;
function initQuiz(){
  shuffledQ=shuffle(quizQ);qIdx=0;correct=0;stars=0;answered=false;
  updateScore();renderQ();
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display='block';
}
function updateScore(){
  document.getElementById('starCount').textContent=stars;
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('totalCount').textContent=`${qIdx}/${shuffledQ.length}`;
  document.getElementById('progressBar').style.width=`${(qIdx/shuffledQ.length)*100}%`;
}
function renderQ(){
  answered=false;
  const q=shuffledQ[qIdx];
  document.getElementById('qNum').textContent=`Q${qIdx+1} of ${shuffledQ.length}`;
  const badge=document.getElementById('chBadge');
  badge.textContent=q.label; badge.className='ch-badge '+q.sec;
  document.getElementById('questionText').textContent=q.q;
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  const card=document.getElementById('questionCard');
  card.style.animation='none';card.offsetHeight;card.style.animation='slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  const area=document.getElementById('answerArea');area.innerHTML='';

  if(q.type==='mc'){
    const grid=document.createElement('div');grid.className='options-grid';
    ['A','B','C','D'].forEach((l,i)=>{
      const btn=document.createElement('button');btn.className='option-btn';
      btn.innerHTML=`<span class="letter">${l}</span><span>${q.opts[i]}</span>`;
      btn.onclick=()=>pickMC(i);grid.appendChild(btn);
    });
    area.appendChild(grid);
  } else {
    const wrap=document.createElement('div');wrap.className='tf-wrap';
    const tb=document.createElement('button');tb.className='tf-btn true-btn';tb.textContent='✅ TRUE';tb.onclick=()=>pickTF(true);
    const fb2=document.createElement('button');fb2.className='tf-btn false-btn';fb2.textContent='❌ FALSE';fb2.onclick=()=>pickTF(false);
    wrap.appendChild(tb);wrap.appendChild(fb2);area.appendChild(wrap);
  }
  const hb=document.createElement('button');hb.className='hint-btn';hb.textContent='💡 Hint';
  const ht=document.createElement('div');ht.className='hint-text';ht.textContent='💡 '+q.hint;
  hb.onclick=()=>ht.classList.toggle('show');
  area.appendChild(hb);area.appendChild(ht);
  updateScore();
}
function pickMC(idx){
  if(answered)return;answered=true;
  const q=shuffledQ[qIdx];
  const btns=document.querySelectorAll('.option-btn');btns.forEach(b=>b.disabled=true);
  if(idx===q.ans){btns[idx].classList.add('correct');showFB(true,'⭐ Correct! '+q.fb);correct++;stars++;sparkle();}
  else{btns[idx].classList.add('wrong');btns[q.ans].classList.add('correct');showFB(false,'❌ Answer: "'+q.opts[q.ans]+'". '+q.fb);}
  document.getElementById('nextBtn').classList.add('show');updateScore();
}
function pickTF(val){
  if(answered)return;answered=true;
  const q=shuffledQ[qIdx];
  const btns=document.querySelectorAll('.tf-btn');btns.forEach(b=>b.disabled=true);
  const ok=val===q.ans;
  const idx=val?0:1;
  btns[idx].classList.add(ok?'correct':'wrong');
  if(!ok)btns[val?1:0].classList.add('correct');
  if(ok){showFB(true,'⭐ Correct! '+q.fb);correct++;stars++;sparkle();}
  else{showFB(false,'❌ '+q.fb);}
  document.getElementById('nextBtn').classList.add('show');updateScore();
}
function showFB(ok,txt){
  const fb=document.getElementById('feedback');
  fb.className='feedback show '+(ok?'correct-fb':'wrong-fb');
  document.getElementById('feedbackIcon').textContent=ok?'🎉':'💙';
  document.getElementById('feedbackText').textContent=txt;
}
function nextQuestion(){qIdx++;if(qIdx>=shuffledQ.length)showResult();else renderQ();}
function showResult(){
  document.getElementById('questionCard').style.display='none';
  document.getElementById('resultScreen').classList.add('show');updateScore();
  const pct=Math.round((correct/shuffledQ.length)*100);
  document.getElementById('resultScore').textContent=`${correct} / ${shuffledQ.length}`;
  if(pct===100){document.getElementById('resultEmoji').textContent='🏆';document.getElementById('resultTitle').textContent='PERFECT SCORE!';document.getElementById('resultMsg').textContent='Nutrition genius, Max! 🌟';document.getElementById('resultStars').textContent='⭐⭐⭐⭐⭐';launchConfetti();}
  else if(pct>=80){document.getElementById('resultEmoji').textContent='🎉';document.getElementById('resultTitle').textContent='Great Job!';document.getElementById('resultMsg').textContent='You really understand nutrition! 💪';document.getElementById('resultStars').textContent='⭐⭐⭐⭐';}
  else if(pct>=60){document.getElementById('resultEmoji').textContent='👍';document.getElementById('resultTitle').textContent='Good Try!';document.getElementById('resultMsg').textContent='Review the tricky ones and try again! 📖';document.getElementById('resultStars').textContent='⭐⭐⭐';}
  else{document.getElementById('resultEmoji').textContent='💪';document.getElementById('resultTitle').textContent='Keep Going!';document.getElementById('resultMsg').textContent='Read the chapter and try again! 📚';document.getElementById('resultStars').textContent='⭐⭐';}
}
function restartQuiz(){document.getElementById('resultScreen').classList.remove('show');initQuiz();}

function sparkle(){
  for(let i=0;i<7;i++)setTimeout(()=>{
    const el=document.createElement('div');
    el.textContent=['⭐','✨','💫','🌟'][Math.floor(Math.random()*4)];
    el.style.cssText=`position:fixed;font-size:1.4rem;pointer-events:none;z-index:9999;left:${20+Math.random()*60}%;top:${20+Math.random()*50}%;animation:confettiFall 1s ease forwards;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
  },i*60);
}
function launchConfetti(){
  const c=['#93C5FD','#FFD700','#4ADE80','#F87171','#A855F7','#FCD34D'];
  for(let i=0;i<60;i++)setTimeout(()=>{
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${c[Math.floor(Math.random()*c.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
  },i*30);
}
initQuiz();
</script>
</body>
</html>
