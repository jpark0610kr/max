<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Quiz 21 🍁</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #16213e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .screen { display: none; width: 100%; max-width: 660px; }
  .screen.active { display: block; }

  #start { background: #1a1a2e; border-radius: 28px; padding: 40px 28px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .maple { font-size: 72px; display: block; margin-bottom: 12px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  h1 { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#FFF8E7; line-height:1.1; margin-bottom:6px; }
  .subtitle { color:#FFD700; font-weight:700; font-size:0.95rem; letter-spacing:1px; margin-bottom:28px; }
  .tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:24px; }
  .tab { padding:9px 18px; border-radius:20px; border:2px solid #4a4a7c; background:#2a2a4c; color:#ccc; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; transition:all 0.18s; }
  .tab:hover { background:#3a3a6c; color:#fff; }
  .tab.active { background:#FFD700; color:#1a1a2e; border-color:#FFD700; }
  .btn-start { background:#C8102E; color:white; border:none; padding:16px 48px; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1.4rem; cursor:pointer; box-shadow:0 6px 0 #9B0B22; transition:all 0.15s; }
  .btn-start:hover { transform:translateY(-3px); box-shadow:0 9px 0 #9B0B22; }
  .btn-start:active { transform:translateY(3px); box-shadow:0 2px 0 #9B0B22; }

  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .q-counter { color:rgba(255,255,255,0.5); font-weight:700; font-size:0.85rem; letter-spacing:1px; }
  .btn-home-top { background:#2a2a4c; color:#aaa; border:1.5px solid #4a4a7c; padding:6px 14px; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.8rem; cursor:pointer; transition:all 0.18s; }
  .btn-home-top:hover { color:#fff; border-color:#fff; }
  .progress-wrap { background:rgba(255,255,255,0.12); border-radius:8px; height:8px; margin-bottom:18px; }
  .progress-bar { background:linear-gradient(90deg,#FFD700,#C8102E); height:100%; border-radius:8px; transition:width 0.4s ease; }
  .card { background:#FFF8E7; border-radius:22px; padding:28px 24px; box-shadow:0 6px 28px rgba(0,0,0,0.35); position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg,#C8102E,#FFD700); }
  .section-badge { display:inline-block; background:#C8102E; color:white; padding:3px 12px; border-radius:20px; font-size:0.72rem; font-weight:800; letter-spacing:1px; margin-bottom:14px; }
  .q-text { font-size:1.1rem; font-weight:800; color:#1a1a2e; line-height:1.5; margin-bottom:20px; }
  .options { display:flex; flex-direction:column; gap:10px; }
  .opt { background:white; border:2.5px solid #e0d5c0; border-radius:14px; padding:13px 16px; text-align:left; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.95rem; color:#1a1a2e; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:10px; }
  .opt:hover:not([disabled]) { border-color:#C8102E; background:#fff5f5; transform:translateX(3px); }
  .opt .ltr { width:30px; height:30px; border-radius:50%; background:#f0e8d5; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; }
  .opt.correct { background:#d4f5e2; border-color:#2ECC71; }
  .opt.correct .ltr { background:#2ECC71; color:white; }
  .opt.wrong { background:#fde8e8; border-color:#E74C3C; }
  .opt.wrong .ltr { background:#E74C3C; color:white; }
  .tf-wrap { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .tf { border:2.5px solid #e0d5c0; border-radius:14px; padding:18px; text-align:center; font-family:'Fredoka One',cursive; font-size:1.3rem; cursor:pointer; transition:all 0.15s; background:white; }
  .tf:hover:not([disabled]) { transform:translateY(-3px); }
  .tf.t { color:#27AE60; }
  .tf.f { color:#E74C3C; }
  .tf.correct { background:#d4f5e2; border-color:#2ECC71; }
  .tf.wrong { background:#fde8e8; border-color:#E74C3C; }
  .feedback { margin-top:16px; padding:13px 16px; border-radius:12px; font-weight:700; font-size:0.9rem; line-height:1.5; display:none; }
  .feedback.show { display:block; animation:fadeIn 0.25s ease; }
  .feedback.ok { background:#d4f5e2; color:#1a6b38; border:2px solid #2ECC71; }
  .feedback.bad { background:#fde8e8; color:#8B0000; border:2px solid #E74C3C; }
  .nav { display:flex; gap:10px; margin-top:14px; }
  .btn-back { background:#2a2a4c; color:white; border:none; padding:13px 20px; border-radius:14px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
  .btn-back:hover { background:#3a3a6c; transform:translateY(-2px); }
  .btn-back:disabled { opacity:0.3; cursor:default; transform:none; }
  .btn-next { flex:1; background:#1a1a2e; color:white; border:none; padding:13px; border-radius:14px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all 0.15s; display:none; }
  .btn-next.show { display:block; animation:fadeIn 0.25s ease; }
  .btn-next:hover { background:#C8102E; transform:translateY(-2px); }

  #result { background:#FFF8E7; border-radius:24px; padding:36px 28px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .result-emoji { font-size:3rem; display:block; margin-bottom:16px; }
  .score-ring { width:130px; height:130px; border-radius:50%; background:#1a1a2e; border:6px solid #FFD700; margin:0 auto 20px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score-num { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#FFD700; line-height:1; }
  .score-lbl { color:rgba(255,255,255,0.5); font-size:0.75rem; font-weight:700; }
  .result-title { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#1a1a2e; margin-bottom:6px; }
  .result-msg { color:#666; font-weight:600; font-size:0.95rem; margin-bottom:24px; }
  .result-btns { display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
  .btn-retry { background:#C8102E; color:white; border:none; padding:13px 28px; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; box-shadow:0 4px 0 #9B0B22; transition:all 0.15s; }
  .btn-retry:hover { transform:translateY(-2px); }
  .btn-home { background:#2a2a4c; color:white; border:none; padding:13px 28px; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all 0.15s; }
  .btn-home:hover { background:#3a3a6c; transform:translateY(-2px); }
  .review { text-align:left; display:flex; flex-direction:column; gap:7px; }
  .review-item { padding:10px 14px; border-radius:10px; font-size:0.85rem; font-weight:600; display:flex; align-items:flex-start; gap:8px; }
  .review-item.ok { background:#d4f5e2; color:#1a6b38; }
  .review-item.miss { background:#fde8e8; color:#8B0000; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="start" class="screen active">
  <span class="maple">🍁</span>
  <h1>History Quiz 21</h1>
  <p class="subtitle">Chapter 10 · Sections 10.4 – 10.6</p>
  <div class="tabs">
    <button class="tab active" data-section="all">All Sections</button>
    <button class="tab" data-section="10.4">10.4 Railway</button>
    <button class="tab" data-section="10.5">10.5 Residential</button>
    <button class="tab" data-section="10.6">10.6 Social Reform</button>
  </div>
  <button class="btn-start" id="btn-start">▶ Start Quiz!</button>
</div>

<div id="quiz" class="screen">
  <div class="top-bar">
    <span class="q-counter" id="q-counter">1 / 23</span>
    <button class="btn-home-top" id="btn-home-top">🏠 Home</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="card">
    <span class="section-badge" id="section-badge">10.4</span>
    <p class="q-text" id="q-text"></p>
    <div id="answer-area"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav">
      <button class="btn-back" id="btn-back">← Back</button>
      <button class="btn-next" id="btn-next">Next →</button>
    </div>
  </div>
</div>

<div id="result" class="screen">
  <span class="result-emoji" id="r-emoji">🏆</span>
  <div class="score-ring">
    <span class="score-num" id="r-score">0/0</span>
    <span class="score-lbl">SCORE</span>
  </div>
  <h2 class="result-title" id="r-title">Amazing!</h2>
  <p class="result-msg" id="r-msg"></p>
  <div class="result-btns">
    <button class="btn-retry" id="btn-retry">🔄 Try Again</button>
    <button class="btn-home" id="btn-home">🏠 Home</button>
  </div>
  <div class="review" id="review"></div>
</div>

<script>
var Q = [
  // ── 10.4 CONNECTING CANADA ──
  {s:'10.4',t:'mc',
   q:'What was a surveyor\'s job?',
   o:['To build railway bridges','To find the shortest and safest route to construct railways','To drive the first locomotive','To manage Chinese labourers'],
   a:1,e:'Surveyors were trained to discover the shortest and safest way to construct railways across the vast Canadian territories.'},

  {s:'10.4',t:'mc',
   q:'Who is one of Canada\'s most famous surveyors?',
   o:['William Van Horne','Donald Smith','Sandford Fleming','Andrew Onderdonk'],
   a:2,e:'Sandford Fleming was one of Canada\'s most famous surveyors. He worked on both the Intercolonial Railway and surveyed for the CPR.'},

  {s:'10.4',t:'mc',
   q:'Which railway connected Quebec City to Halifax?',
   o:['Canadian Pacific Railway','Grand Trunk Railway','Intercolonial Railway','National Transcontinental Railway'],
   a:2,e:'The Intercolonial Railway was completed on July 6, 1876, connecting Halifax to Quebec City.'},

  {s:'10.4',t:'mc',
   q:'Which railway connected British Columbia to the east?',
   o:['Intercolonial Railway','Canadian Pacific Railway','Grand Trunk Railway','Rocky Mountain Railway'],
   a:1,e:'The Canadian Pacific Railway (CPR) connected British Columbia to eastern Canada.'},

  {s:'10.4',t:'mc',
   q:'What was the greatest obstacle in building the transcontinental railway?',
   o:['The Prairies','The Fraser Canyon','The Rocky Mountains','The Arctic tundra'],
   a:2,e:'The Rocky Mountains were the last and greatest obstacle. James Ross built the dangerous track at Kicking Horse Pass.'},

  {s:'10.4',t:'mc',
   q:'Where did the east and west railway construction crews finally meet?',
   o:['Kicking Horse Pass','Fraser Canyon','Winnipeg','Eagle Pass'],
   a:3,e:'On November 7, 1885, the east and west crews met at Eagle Pass in the Rocky Mountains.'},

  {s:'10.4',t:'mc',
   q:'When was the Canadian Pacific Railway completed?',
   o:['July 6, 1876','November 7, 1885','January 1, 1881','July 15, 1870'],
   a:1,e:'The CPR was completed on November 7, 1885, when the last spike was driven at Eagle Pass.'},

  {s:'10.4',t:'mc',
   q:'How many Chinese labourers were brought to Canada to build the railway?',
   o:['2,000','4,000','6,000','10,000'],
   a:2,e:'Andrew Onderdonk had 6,000 workers from the Chinese province of Kwangtung brought to Canada.'},

  {s:'10.4',t:'tf',
   q:'True or False: Most Chinese labourers were able to save enough money to return to China.',
   a:false,e:'FALSE! They had to pay for food and shelter from low wages. It was unusual to save more than $50 a year. More than 5,000 never returned to China.'},

  {s:'10.4',t:'mc',
   q:'Who hammered in the Last Spike on November 7, 1885?',
   o:['Sandford Fleming','William Van Horne','Andrew Onderdonk','Donald Smith'],
   a:3,e:'Donald Smith, the senior director of the Canadian Pacific Railway Company, hammered in the last spike.'},

  // ── 10.5 RESIDENTIAL SCHOOLS ──
  {s:'10.5',t:'mc',
   q:'What was the main goal of residential schools?',
   o:['To teach Indigenous children advanced academics','To make Indigenous children adopt white customs and beliefs','To help Indigenous children learn their own language','To prepare Indigenous children for university'],
   a:1,e:'The main goal was to make Indigenous children learn how to live according to white customs and beliefs.'},

  {s:'10.5',t:'mc',
   q:'What were girls taught at residential schools?',
   o:['Reading, writing, and math','Farming, carpentry, and maintenance','Laundry, sewing, cooking, and cleaning','Science and history'],
   a:2,e:'Girls were taught laundry, sewing, cooking, and cleaning — not the same education as non-Indigenous children.'},

  {s:'10.5',t:'mc',
   q:'What were boys taught at residential schools?',
   o:['Reading and writing','Farming, carpentry, and maintenance','Cooking and sewing','Law and government'],
   a:1,e:'Boys were taught farming, carpentry, and maintenance — practical labour, not equal academics.'},

  {s:'10.5',t:'mc',
   q:'When was the first residential school opened?',
   o:['1867','1831','1920','1880'],
   a:1,e:'The first residential school was opened in 1831 — the Mohawk Institute in Brantford, Ontario.'},

  {s:'10.5',t:'mc',
   q:'When was the last residential school closed?',
   o:['1980','1990','1996','2005'],
   a:2,e:'In 1996, the last residential school was closed and demolished.'},

  {s:'10.5',t:'mc',
   q:'When is National Day for Truth and Reconciliation?',
   o:['July 1','November 11','September 30','October 31'],
   a:2,e:'September 30 is the National Day for Truth and Reconciliation. Canadians wear orange to honour lost children and survivors.'},

  {s:'10.5',t:'tf',
   q:'True or False: Indigenous children at residential schools were allowed to speak their own language.',
   a:false,e:'FALSE! They were NOT allowed to speak their language or practise their culture. If they did, they were severely punished.'},

  // ── 10.6 SOCIAL REFORM ──
  {s:'10.6',t:'mc',
   q:'What was the Social Gospel?',
   o:['A new type of school','A political party','A religious movement that wanted to solve society\'s problems through Christian principles','A newspaper for immigrants'],
   a:2,e:'The Social Gospel was a religious movement that wanted to solve all the bad things in society through Christian principles.'},

  {s:'10.6',t:'mc',
   q:'Who started the Salvation Army?',
   o:['Nellie McClung','Emily Stowe','William Booth','Donald Smith'],
   a:2,e:'The Salvation Army was started by William Booth in England. He later travelled to Canada in 1882 to establish centres to help the poor.'},

  {s:'10.6',t:'mc',
   q:'What is suffrage?',
   o:['The right to own property','The right to vote in elections','The right to free education','The right to free speech'],
   a:1,e:'Suffrage is the right to vote in elections. The Women\'s Suffrage Movement fought for women to have this right.'},

  {s:'10.6',t:'tf',
   q:'True or False: Women were considered persons under the law in Canada in the 1800s.',
   a:false,e:'FALSE! Women were NOT considered persons in the eyes of the law. When married, all her belongings and wages became property of her husband.'},

  {s:'10.6',t:'mc',
   q:'Why did Emily Stowe go to school in the USA to become a doctor?',
   o:['The USA had better medical schools','Canadian medical schools did not allow women to attend','She wanted to learn American medicine','She could not afford Canadian schools'],
   a:1,e:'Canada did not allow women to attend medical school, so Emily Stowe went to the USA where some schools admitted female students.'},

  {s:'10.6',t:'mc',
   q:'Who was the first woman to graduate from a Canadian medical college?',
   o:['Emily Stowe','Nellie McClung','Ginny Trout','Augusta Stowe'],
   a:3,e:'Augusta Stowe, Emily Stowe\'s daughter, was the first woman to graduate from a Canadian medical college in 1883.'},

  {s:'10.6',t:'mc',
   q:'Who was the most famous and influential person for women\'s suffrage in Canada?',
   o:['Emily Stowe','Augusta Stowe','Ginny Trout','Nellie McClung'],
   a:3,e:'Nellie McClung was the most famous and influential person for women\'s suffrage in Canada.'},

  {s:'10.6',t:'mc',
   q:'In what year did Canadian women first get the right to vote?',
   o:['1900','1910','1916','1940'],
   a:2,e:'On January 27, 1916, Nellie McClung succeeded in getting women in Manitoba the right to vote — the first province in Canada.'},

  {s:'10.6',t:'mc',
   q:'Which province was the LAST in Canada to allow women to vote?',
   o:['Ontario','British Columbia','Alberta','Quebec'],
   a:3,e:'Quebec was the last province to allow women to vote and hold office — on April 25, 1940.'}
];

var pool=[], idx=0, score=0, answered=false, log=[], section='all';

function shuffle(arr) {
  var a=arr.slice(),i,j,tmp;
  for(i=a.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}
function showScreen(id) {
  var s=document.querySelectorAll('.screen');
  for(var i=0;i<s.length;i++) s[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}
function goHome() {
  pool=[];idx=0;score=0;log=[];answered=false;section='all';
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  document.querySelector('.tab[data-section="all"]').classList.add('active');
  showScreen('start');
}
function startQuiz() {
  var src=section==='all'?Q:Q.filter(function(q){return q.s===section;});
  pool=shuffle(src);idx=0;score=0;log=[];answered=false;
  showScreen('quiz');render();
}
function render() {
  var q=pool[idx];
  answered=false;
  document.getElementById('q-counter').textContent=(idx+1)+' / '+pool.length;
  document.getElementById('progress-bar').style.width=(idx/pool.length*100)+'%';
  document.getElementById('section-badge').textContent='Section '+q.s;
  document.getElementById('q-text').textContent=q.q;
  var fb=document.getElementById('feedback');
  fb.className='feedback';fb.textContent='';
  var nb=document.getElementById('btn-next');
  nb.className='btn-next';
  nb.textContent=idx===pool.length-1?'🏁 See Results!':'Next →';
  document.getElementById('btn-back').disabled=(idx===0);
  var area=document.getElementById('answer-area');
  area.innerHTML='';
  if(q.t==='mc'){
    var wrap=document.createElement('div');
    wrap.className='options';
    ['A','B','C','D'].forEach(function(ltr,i){
      var btn=document.createElement('button');
      btn.className='opt';
      btn.innerHTML='<span class="ltr">'+ltr+'</span>'+q.o[i];
      btn.onclick=(function(i){return function(){checkMC(i);};})(i);
      wrap.appendChild(btn);
    });
    area.appendChild(wrap);
  } else {
    var tw=document.createElement('div');
    tw.className='tf-wrap';
    var tb=document.createElement('button');
    tb.className='tf t';tb.textContent='✅ TRUE';
    tb.onclick=function(){checkTF(true);};
    var fb2=document.createElement('button');
    fb2.className='tf f';fb2.textContent='❌ FALSE';
    fb2.onclick=function(){checkTF(false);};
    tw.appendChild(tb);tw.appendChild(fb2);
    area.appendChild(tw);
  }
}
function checkMC(chosen) {
  if(answered)return;
  answered=true;
  var q=pool[idx];
  var btns=document.querySelectorAll('.opt');
  for(var i=0;i<btns.length;i++) btns[i].setAttribute('disabled','true');
  var ok=chosen===q.a;
  btns[chosen].classList.add(ok?'correct':'wrong');
  if(!ok) btns[q.a].classList.add('correct');
  record(ok,q.e);
}
function checkTF(chosen) {
  if(answered)return;
  answered=true;
  var q=pool[idx];
  var btns=document.querySelectorAll('.tf');
  for(var i=0;i<btns.length;i++) btns[i].setAttribute('disabled','true');
  var ok=chosen===q.a;
  (chosen?btns[0]:btns[1]).classList.add(ok?'correct':'wrong');
  if(!ok)(q.a?btns[0]:btns[1]).classList.add('correct');
  record(ok,q.e);
}
function record(ok,explain) {
  if(log.length<=idx){
    log.push({q:pool[idx].q,ok:ok});
    if(ok)score++;
  } else {
    var old=log[idx];
    if(old.ok!==ok){if(old.ok)score--;if(ok)score++;log[idx]={q:pool[idx].q,ok:ok};}
  }
  var fb=document.getElementById('feedback');
  fb.textContent=(ok?'🎉 Correct! ':'❌ Not quite. ')+explain;
  fb.className='feedback show '+(ok?'ok':'bad');
  document.getElementById('btn-next').className='btn-next show';
}

var tabs=document.querySelectorAll('.tab');
for(var i=0;i<tabs.length;i++){
  tabs[i].addEventListener('click',function(){
    var all=document.querySelectorAll('.tab');
    for(var j=0;j<all.length;j++) all[j].classList.remove('active');
    this.classList.add('active');
    section=this.dataset.section;
  });
}
document.getElementById('btn-start').addEventListener('click',startQuiz);
document.getElementById('btn-home-top').addEventListener('click',goHome);
document.getElementById('btn-home').addEventListener('click',goHome);
document.getElementById('btn-retry').addEventListener('click',function(){
  idx=0;score=0;log=[];answered=false;pool=shuffle(pool);
  showScreen('quiz');render();
});
document.getElementById('btn-next').addEventListener('click',function(){
  if(!answered)return;
  idx++;
  if(idx>=pool.length)showResult();
  else render();
});
document.getElementById('btn-back').addEventListener('click',function(){
  if(idx<=0)return;
  if(answered&&log.length>idx){var e=log.pop();if(e.ok)score--;}
  idx--;
  if(log.length>idx){var p=log.pop();if(p.ok)score--;}
  render();
});
function showResult(){
  document.getElementById('progress-bar').style.width='100%';
  showScreen('result');
  var pct=score/pool.length;
  document.getElementById('r-score').textContent=score+'/'+pool.length;
  var emoji,title,msg;
  if(pct===1){emoji='🏆';title='PERFECT SCORE!';msg='You are a Canadian history champion! 🍁';}
  else if(pct>=.8){emoji='🌟';title='Excellent!';msg='Almost perfect — great work!';}
  else if(pct>=.6){emoji='👍';title='Good Job!';msg='Solid! Review the missed ones and try again.';}
  else if(pct>=.4){emoji='📚';title='Keep Studying!';msg='Read the chapter again and give it another shot!';}
  else{emoji='🍁';title='Study More!';msg='Do not give up! Go over the chapter and retry.';}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-msg').textContent=msg;
  var html='';
  for(var i=0;i<log.length;i++){
    html+='<div class="review-item '+(log[i].ok?'ok':'miss')+'">';
    html+='<span>'+(log[i].ok?'✅':'❌')+'</span><span>'+log[i].q+'</span></div>';
  }
  document.getElementById('review').innerHTML=html;
}
</script>
</body>
</html>
