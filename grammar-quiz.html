<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max's Grammar Quiz 🎵</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #4FC3F7;
    --navy: #1A237E;
    --yellow: #FFD600;
    --green: #00C853;
    --red: #FF1744;
    --orange: #FF6D00;
    --white: #FFFFFF;
    --light: #E3F2FD;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1A237E 0%, #283593 40%, #1565C0 100%);
    min-height: 100vh;
    padding: 20px;
  }

  /* Stars background */
  body::before {
    content: '★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★';
    position: fixed;
    top: 10px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.1);
    font-size: 24px;
    letter-spacing: 20px;
    pointer-events: none;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    text-align: center;
    color: var(--yellow);
    font-size: clamp(2rem, 6vw, 3.5rem);
    text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    margin-bottom: 6px;
    animation: bounceIn 0.6s ease;
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.8);
    font-size: 1rem;
    margin-bottom: 24px;
    font-weight: 600;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .score-chip {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 8px 22px;
    color: white;
    font-size: 1rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .score-chip span { font-size: 1.3rem; }

  /* Topic tabs */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .tab-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    padding: 8px 16px;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--yellow);
    color: var(--navy);
    border-color: var(--yellow);
    transform: translateY(-2px);
  }
  .tab-btn.done { border-color: var(--green); color: var(--green); }
  .tab-btn.done.active { background: var(--green); color: white; }

  /* Progress */
  .progress-wrap {
    max-width: 680px;
    margin: 0 auto 16px;
    background: rgba(255,255,255,0.15);
    border-radius: 50px;
    height: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--yellow), var(--orange));
    border-radius: 50px;
    transition: width 0.5s ease;
  }

  /* Quiz card */
  .quiz-card {
    max-width: 680px;
    margin: 0 auto 16px;
    background: var(--card);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    animation: slideUp 0.4s ease;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .q-number {
    font-weight: 800;
    color: #9E9E9E;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .lesson-badge {
    background: var(--light);
    color: var(--navy);
    font-size: 0.75rem;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 50px;
  }

  .question-text {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .rule-box {
    background: #FFF8E1;
    border-left: 4px solid var(--yellow);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 0.88rem;
    color: #5D4037;
    font-weight: 600;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 13px 18px;
    border-radius: 14px;
    border: 2.5px solid #E0E0E0;
    background: white;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    color: #333;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #F5F5F5;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 800;
    color: #757575;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--sky);
    background: var(--light);
    transform: translateX(4px);
  }
  .option-btn:hover:not(:disabled) .option-letter {
    background: var(--sky);
    color: white;
  }
  .option-btn.correct {
    border-color: var(--green);
    background: #E8F5E9;
    color: #1B5E20;
  }
  .option-btn.correct .option-letter { background: var(--green); color: white; }
  .option-btn.wrong {
    border-color: var(--red);
    background: #FFEBEE;
    color: #B71C1C;
  }
  .option-btn.wrong .option-letter { background: var(--red); color: white; }
  .option-btn.reveal-correct {
    border-color: var(--green);
    background: #E8F5E9;
    color: #1B5E20;
    animation: pulse 0.4s ease;
  }
  .option-btn:disabled { cursor: default; }

  /* Fill-in */
  .fill-input {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    width: 100%;
    padding: 12px 16px;
    border: 2.5px solid #E0E0E0;
    border-radius: 14px;
    outline: none;
    transition: border-color 0.2s;
    color: var(--navy);
  }
  .fill-input:focus { border-color: var(--sky); }
  .fill-input.correct { border-color: var(--green); background: #E8F5E9; }
  .fill-input.wrong { border-color: var(--red); background: #FFEBEE; }

  /* Feedback */
  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.95rem;
    display: none;
  }
  .feedback.show { display: flex; align-items: center; gap: 10px; }
  .feedback.correct { background: #E8F5E9; color: #2E7D32; }
  .feedback.wrong { background: #FFEBEE; color: #C62828; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    padding: 12px 24px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--navy);
    color: white;
    flex: 1;
  }
  .btn-primary:hover { background: #283593; transform: translateY(-2px); }
  .btn-primary:disabled { background: #BDBDBD; cursor: default; transform: none; }
  .btn-skip {
    background: #F5F5F5;
    color: #757575;
    padding: 12px 18px;
  }
  .btn-skip:hover { background: #EEEEEE; }

  /* Result screen */
  .result-screen {
    max-width: 680px;
    margin: 0 auto;
    background: white;
    border-radius: 24px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    display: none;
    animation: bounceIn 0.5s ease;
  }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 5rem; margin-bottom: 12px; }
  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .result-score {
    font-size: 1.2rem;
    color: #555;
    margin-bottom: 28px;
    font-weight: 700;
  }
  .result-breakdown {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .breakdown-chip {
    padding: 8px 18px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 0.9rem;
  }
  .chip-correct { background: #E8F5E9; color: #2E7D32; }
  .chip-wrong { background: #FFEBEE; color: #C62828; }
  .btn-restart {
    background: var(--yellow);
    color: var(--navy);
    padding: 14px 40px;
    font-size: 1.1rem;
  }
  .btn-restart:hover { transform: scale(1.05); }

  /* Review section */
  .review-section {
    max-width: 680px;
    margin: 0 auto 20px;
    display: none;
  }
  .review-section.show { display: block; }
  .review-title {
    font-family: 'Fredoka One', cursive;
    color: var(--yellow);
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 14px;
  }
  .review-item {
    background: white;
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 10px;
    border-left: 5px solid var(--red);
  }
  .review-item .q { font-weight: 700; color: var(--navy); margin-bottom: 6px; font-size: 0.95rem; }
  .review-item .your-answer { color: var(--red); font-size: 0.85rem; margin-bottom: 2px; }
  .review-item .correct-answer { color: var(--green); font-size: 0.85rem; font-weight: 700; }

  @keyframes bounceIn {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .quiz-card { padding: 20px; }
    .question-text { font-size: 1rem; }
  }
</style>
</head>
<body>

<h1>🎵 Grammar Quest</h1>
<p class="subtitle">Language 4 · Lessons 136–141</p>

<div class="score-bar">
  <div class="score-chip"><span>✅</span> <span id="correct-count">0</span> Correct</div>
  <div class="score-chip"><span>❌</span> <span id="wrong-count">0</span> Wrong</div>
  <div class="score-chip"><span>🏆</span> <span id="pct">0</span>%</div>
</div>

<div class="tabs" id="tabs"></div>

<div class="progress-wrap">
  <div class="progress-fill" id="progress" style="width:0%"></div>
</div>

<div class="quiz-card" id="quiz-card">
  <div class="q-meta">
    <span class="q-number" id="q-number">Question 1 / 30</span>
    <span class="lesson-badge" id="lesson-badge">Lesson 136</span>
  </div>
  <div class="question-text" id="question-text"></div>
  <div class="rule-box" id="rule-box" style="display:none"></div>
  <div id="answer-area"></div>
  <div class="feedback" id="feedback"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()" disabled>Check ✓</button>
    <button class="btn btn-skip" onclick="nextQuestion()">Skip →</button>
  </div>
</div>

<div class="result-screen" id="result-screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">Awesome!</div>
  <div class="result-score" id="result-score"></div>
  <div class="result-breakdown">
    <div class="breakdown-chip chip-correct" id="r-correct"></div>
    <div class="breakdown-chip chip-wrong" id="r-wrong"></div>
  </div>
  <button class="btn btn-restart" onclick="restartQuiz()">🔄 Play Again</button>
</div>

<div class="review-section" id="review-section">
  <div class="review-title">📝 Review Wrong Answers</div>
  <div id="review-list"></div>
</div>

<script>
const topics = [
  { id: 136, label: "136 Adverb Comparison" },
  { id: 137, label: "137 Adj vs Adv" },
  { id: 138, label: "138 Modifiers" },
  { id: 139, label: "139 Good/Well + Negatives" },
  { id: 140, label: "140 Diagramming" },
  { id: 141, label: "141 Conjunctions" },
];

const allQuestions = [
  // ── LESSON 136: Adverb Comparison ──────────────────────────────
  {
    lesson: 136,
    type: "mc",
    q: "Michael ran faster than everyone. But of all the runners, he ran the ___ .",
    hint: "Comparing ALL runners → use -est form",
    options: ["fast", "faster", "fastest", "most fast"],
    answer: 2
  },
  {
    lesson: 136,
    type: "mc",
    q: "Mr. Smith arrived ___ for choir practice than Mr. Green did.",
    hint: "Comparing TWO people → use -er form",
    options: ["late", "later", "latest", "most late"],
    answer: 1
  },
  {
    lesson: 136,
    type: "mc",
    q: "Nathan can whistle ___ than Owen can.",
    hint: "Comparing TWO people → -er",
    options: ["high", "higher", "highest", "most high"],
    answer: 1
  },
  {
    lesson: 136,
    type: "mc",
    q: "Of all her classmates, Kelly works the ___.",
    hint: "Comparing ALL classmates → -est",
    options: ["hard", "harder", "hardest", "most hard"],
    answer: 2
  },
  {
    lesson: 136,
    type: "mc",
    q: "Of all the violinists, Nathan practices ___ diligently.",
    hint: "Can't say 'diligentliest' — use more/most",
    options: ["more", "most", "diligentlier", "much"],
    answer: 1
  },
  {
    lesson: 136,
    type: "mc",
    q: "Bella plays the notes ___ accurately than Katie does.",
    hint: "Comparing TWO people → 'more'",
    options: ["most", "more", "much", "very"],
    answer: 1
  },
  {
    lesson: 136,
    type: "mc",
    q: "You are limping ___ today than yesterday.",
    hint: "Comparing TWO situations — special adverb",
    options: ["bad", "badly", "worse", "worst"],
    answer: 2
  },
  {
    lesson: 136,
    type: "mc",
    q: "Compared to all other competitors, he sang ___.",
    hint: "Comparing 3+ → best or worst?",
    options: ["better", "best", "good", "well"],
    answer: 1
  },

  // ── LESSON 137: Adjective vs Adverb ────────────────────────────
  {
    lesson: 137,
    type: "mc",
    q: "What does an ADJECTIVE describe?",
    options: [
      "A verb — how an action is done",
      "A noun or pronoun — what kind, how many, which one",
      "Another adverb",
      "A conjunction"
    ],
    answer: 1
  },
  {
    lesson: 137,
    type: "mc",
    q: "What does an ADVERB describe?",
    options: [
      "A noun — what kind",
      "A pronoun — which one",
      "A verb — how, when, where, how often",
      "Only adjectives"
    ],
    answer: 2
  },
  {
    lesson: 137,
    type: "mc",
    q: "In 'Jesus prayed compassionately', what is 'compassionately'?",
    options: ["Adjective", "Adverb", "Noun", "Conjunction"],
    answer: 1
  },
  {
    lesson: 137,
    type: "mc",
    q: "In 'Jesus bore unjust punishment', what is 'unjust'?",
    options: ["Adverb", "Verb", "Adjective", "Subject"],
    answer: 2
  },
  {
    lesson: 137,
    type: "mc",
    q: "In 'Jesus rose victoriously from the grave', 'victoriously' describes...",
    options: ["the grave (noun)", "rose (verb)", "Jesus (noun)", "from (preposition)"],
    answer: 1
  },
  {
    lesson: 137,
    type: "mc",
    q: "Which sentence uses 'good' correctly?",
    options: [
      "She sings good.",
      "She is a good singer.",
      "He played good yesterday.",
      "Good, he ran to school."
    ],
    answer: 1
  },

  // ── LESSON 138: Modifiers + Plural Spelling ─────────────────────
  {
    lesson: 138,
    type: "mc",
    q: "Adjectives AND adverbs are both called ___.",
    options: ["conjunctions", "modifiers", "subjects", "predicates"],
    answer: 1
  },
  {
    lesson: 138,
    type: "mc",
    q: "What is the correct plural of 'penny'?",
    options: ["pennys", "pennies", "penniess", "None of these"],
    answer: 1
  },
  {
    lesson: 138,
    type: "mc",
    q: "What is the correct plural of 'trout'?",
    options: ["trouts", "trice", "trout", "troutes"],
    answer: 2
  },
  {
    lesson: 138,
    type: "mc",
    q: "What is the correct plural of 'loaf'?",
    options: ["loafs", "loavs", "loaves", "loafes"],
    answer: 2
  },
  {
    lesson: 138,
    type: "mc",
    q: "In 'The musicians' elegant clothes rustled quietly', 'elegantly' modifies...",
    hint: "'Elegant' is an adjective — what does it describe?",
    options: ["rustled (verb)", "quietly (adverb)", "clothes (noun)", "musicians (noun)"],
    answer: 2
  },

  // ── LESSON 139: good/well + Double Negatives ────────────────────
  {
    lesson: 139,
    type: "mc",
    q: "Complete: 'This is a ___ painting.' (good / well)",
    hint: "Painting is a NOUN — use adjective",
    options: ["well", "good", "better", "best"],
    answer: 1
  },
  {
    lesson: 139,
    type: "mc",
    q: "Complete: 'Christopher writes ___ .' (good / well)",
    hint: "Writes is a VERB — use adverb",
    options: ["good", "well", "goodly", "better"],
    answer: 1
  },
  {
    lesson: 139,
    type: "mc",
    q: "Which sentence is CORRECT? (No double negatives!)",
    options: [
      "I can't find my book nowhere.",
      "I can't find my book anywhere.",
      "I cannot find no book.",
      "I can't never find my book."
    ],
    answer: 1
  },
  {
    lesson: 139,
    type: "mc",
    q: "Which sentence is CORRECT?",
    options: [
      "My grandma hasn't never ridden a plane.",
      "My grandma hasn't ever ridden a plane.",
      "My grandma has never not ridden a plane.",
      "My grandma hasn't ridden no plane."
    ],
    answer: 1
  },
  {
    lesson: 139,
    type: "mc",
    q: "Which words are NEGATIVE adverbs? (pick the best answer)",
    options: [
      "and, but, or",
      "good, well, better",
      "not, never, hardly, scarcely",
      "fast, slow, loud"
    ],
    answer: 2
  },

  // ── LESSON 140: Diagramming & Apostrophes ───────────────────────
  {
    lesson: 140,
    type: "mc",
    q: "In sentence diagramming, what does 'S' stand for?",
    options: ["Sentence", "Subject", "Simple", "Second"],
    answer: 1
  },
  {
    lesson: 140,
    type: "mc",
    q: "In sentence diagramming, what does 'DO' stand for?",
    options: ["Doing word", "Double object", "Direct Object", "Describing Object"],
    answer: 2
  },
  {
    lesson: 140,
    type: "mc",
    q: "Which is written correctly? (apostrophe rule)",
    options: [
      "violins, violas, cellos and, basses",
      "violins, violas, cellos, and basses",
      "violins violas cellos and basses",
      "violins, violas, cello's and basses"
    ],
    answer: 1
  },
  {
    lesson: 140,
    type: "mc",
    q: "Which is correct for a plural noun showing possession?",
    options: ["oboes's notes", "oboes' notes", "oboe's notes", "oboess notes"],
    answer: 1
  },

  // ── LESSON 141: Conjunctions ────────────────────────────────────
  {
    lesson: 141,
    type: "mc",
    q: "A CONJUNCTION does what in a sentence?",
    options: [
      "Describes a noun",
      "Joins words or groups of words",
      "Names a person or place",
      "Shows action"
    ],
    answer: 1
  },
  {
    lesson: 141,
    type: "mc",
    q: "Which of these is NOT one of the 7 conjunctions from Lesson 141?",
    options: ["and", "but", "because", "yet"],
    answer: 2
  },
  {
    lesson: 141,
    type: "mc",
    q: "Choose the best conjunction: 'The Old Testament ___ the New Testament both talk about musical instruments.'",
    options: ["but", "or", "and", "nor"],
    answer: 2
  },
  {
    lesson: 141,
    type: "mc",
    q: "Choose the best conjunction: 'People played harps and trumpets, ___ many other instruments.'",
    options: ["and", "but", "or", "for"],
    answer: 1
  },
];

// ── State ────────────────────────────────────────────────────────
let questions = [];
let current = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let selectedAnswer = null;
let wrongAnswers = [];
let activeTopic = "all";

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function buildTabs() {
  const tabDiv = document.getElementById('tabs');
  tabDiv.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'tab-btn' + (activeTopic === 'all' ? ' active' : '');
  allBtn.textContent = '📚 All Topics';
  allBtn.onclick = () => setTopic('all');
  tabDiv.appendChild(allBtn);
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (activeTopic === t.id ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => setTopic(t.id);
    tabDiv.appendChild(btn);
  });
}

function setTopic(id) {
  activeTopic = id;
  buildTabs();
  questions = shuffle(id === 'all' ? allQuestions : allQuestions.filter(q => q.lesson === id));
  current = 0; correctCount = 0; wrongCount = 0; answered = false;
  selectedAnswer = null; wrongAnswers = [];
  updateScoreBar();
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('review-section').classList.remove('show');
  document.getElementById('quiz-card').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  if (current >= questions.length) { showResult(); return; }
  answered = false;
  selectedAnswer = null;
  const q = questions[current];

  document.getElementById('q-number').textContent = `Question ${current + 1} / ${questions.length}`;
  document.getElementById('lesson-badge').textContent = `Lesson ${q.lesson}`;
  document.getElementById('question-text').textContent = q.q;

  const ruleBox = document.getElementById('rule-box');
  if (q.hint) {
    ruleBox.style.display = 'block';
    ruleBox.textContent = '💡 ' + q.hint;
  } else {
    ruleBox.style.display = 'none';
  }

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';

  const area = document.getElementById('answer-area');
  area.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'options';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectOption(i, btn);
    div.appendChild(btn);
  });
  area.appendChild(div);
  document.getElementById('check-btn').disabled = true;

  const prog = ((current) / questions.length) * 100;
  document.getElementById('progress').style.width = prog + '%';
  document.getElementById('quiz-card').style.animation = 'none';
  setTimeout(() => document.getElementById('quiz-card').style.animation = 'slideUp 0.35s ease', 10);
}

function selectOption(index, btn) {
  if (answered) return;
  selectedAnswer = index;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.style.borderColor = '#E0E0E0';
    b.style.background = 'white';
    b.querySelector('.option-letter').style.background = '#F5F5F5';
    b.querySelector('.option-letter').style.color = '#757575';
  });
  btn.style.borderColor = '#4FC3F7';
  btn.style.background = '#E3F2FD';
  btn.querySelector('.option-letter').style.background = '#4FC3F7';
  btn.querySelector('.option-letter').style.color = 'white';
  document.getElementById('check-btn').disabled = false;
}

function checkAnswer() {
  if (answered || selectedAnswer === null) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  const fb = document.getElementById('feedback');
  btns.forEach(b => b.disabled = true);

  if (selectedAnswer === q.answer) {
    btns[selectedAnswer].className = 'option-btn correct';
    correctCount++;
    fb.className = 'feedback correct show';
    fb.innerHTML = '🎉 Correct! Great job!';
  } else {
    btns[selectedAnswer].className = 'option-btn wrong';
    btns[q.answer].className = 'option-btn reveal-correct';
    wrongCount++;
    fb.className = 'feedback wrong show';
    fb.innerHTML = `❌ Not quite. The correct answer is: <strong>${q.options[q.answer]}</strong>`;
    wrongAnswers.push({ q: q.q, yours: q.options[selectedAnswer], correct: q.options[q.answer] });
  }
  fb.style.display = 'flex';
  updateScoreBar();
  document.getElementById('check-btn').textContent = 'Next →';
  document.getElementById('check-btn').onclick = nextQuestion;
  document.getElementById('check-btn').disabled = false;
}

function nextQuestion() {
  current++;
  document.getElementById('check-btn').textContent = 'Check ✓';
  document.getElementById('check-btn').onclick = checkAnswer;
  showQuestion();
}

function updateScoreBar() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('pct').textContent = pct;
}

function showResult() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('progress').style.width = '100%';
  const total = questions.length;
  const pct = Math.round((correctCount / total) * 100);
  let emoji, title;
  if (pct >= 90) { emoji = '🏆'; title = 'AMAZING, MAX!'; }
  else if (pct >= 75) { emoji = '🌟'; title = 'Great Job!'; }
  else if (pct >= 60) { emoji = '👍'; title = 'Good Try!'; }
  else { emoji = '💪'; title = 'Keep Practicing!'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = `You got ${correctCount} out of ${total} correct (${pct}%)`;
  document.getElementById('r-correct').textContent = `✅ ${correctCount} Correct`;
  document.getElementById('r-wrong').textContent = `❌ ${wrongCount} Wrong`;
  document.getElementById('result-screen').classList.add('show');

  if (wrongAnswers.length > 0) {
    const rev = document.getElementById('review-section');
    const list = document.getElementById('review-list');
    list.innerHTML = '';
    wrongAnswers.forEach(w => {
      const item = document.createElement('div');
      item.className = 'review-item';
      item.innerHTML = `<div class="q">Q: ${w.q}</div>
        <div class="your-answer">Your answer: ${w.yours}</div>
        <div class="correct-answer">✅ Correct: ${w.correct}</div>`;
      list.appendChild(item);
    });
    rev.classList.add('show');
  }
}

function restartQuiz() {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('review-section').classList.remove('show');
  document.getElementById('quiz-card').style.display = 'block';
  setTopic(activeTopic);
}

// Init
buildTabs();
setTopic('all');
</script>
</body>
</html>
