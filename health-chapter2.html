<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max's Brain Quiz! 🧠</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #00D4AA;
    --purple: #A855F7;
    --yellow: #FFD700;
    --green: #2ECC71;
    --red: #FF4757;
    --orange: #FF8C00;
    --blue: #3B82F6;
    --dark: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,212,170,0.06) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
  }
  .bg-floats {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
  }
  .bg-float {
    position: absolute; opacity: 0.06;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.06; }
    90% { opacity: 0.06; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 800px; margin: 0 auto; padding: 20px;
  }

  /* HEADER */
  .header { text-align: center; padding: 28px 0 18px; }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.4rem);
    color: var(--teal);
    text-shadow: 0 0 30px rgba(0,212,170,0.4), 4px 4px 0 rgba(0,0,0,0.3);
    animation: titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes titlePop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .header p { color: var(--purple); font-size: 1.05rem; font-weight: 700; margin-top: 6px; letter-spacing: 1px; }

  /* SCORE BAR */
  .score-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card); border: 2px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 14px 24px; margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .score-item { text-align: center; }
  .score-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.45); font-weight: 700; }
  .score-value { font-family: 'Fredoka One', cursive; font-size: 1.75rem; line-height: 1; margin-top: 2px; }
  .score-item.stars .score-value { color: var(--yellow); }
  .score-item.correct .score-value { color: var(--green); }
  .score-item.total .score-value { color: var(--teal); }

  /* PROGRESS */
  .progress-wrap { background: rgba(255,255,255,0.08); border-radius: 50px; height: 12px; margin-bottom: 26px; overflow: hidden; }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, var(--teal), var(--purple));
    border-radius: 50px; transition: width 0.5s ease; position: relative; overflow: hidden;
  }
  .progress-bar::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

  /* SECTION BADGE */
  .section-divider {
    text-align: center; margin-bottom: 18px;
    font-family: 'Fredoka One', cursive; font-size: 1rem;
    color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card); border: 2px solid rgba(255,255,255,0.07);
    border-radius: 28px; padding: 30px; margin-bottom: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideIn {
    from { transform: translateY(30px) scale(0.95); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .question-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--teal), #059669);
    color: white; font-size: 0.72rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.5px;
    padding: 5px 14px; border-radius: 50px; margin-bottom: 14px;
  }
  .question-text {
    font-size: clamp(1.05rem, 2.8vw, 1.3rem); font-weight: 800;
    color: white; line-height: 1.55; margin-bottom: 22px;
  }

  /* MULTIPLE CHOICE */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }
  .option-btn {
    background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 15px; padding: 14px 16px; color: white;
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; text-align: left; transition: all 0.2s;
    display: flex; align-items: center; gap: 11px;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(0,212,170,0.12); border-color: var(--teal);
    transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,212,170,0.18);
  }
  .option-btn .letter {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.09); display: flex; align-items: center;
    justify-content: center; font-family: 'Fredoka One', cursive; font-size: 0.95rem;
    flex-shrink: 0; transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) .letter { background: var(--teal); color: var(--dark); }
  .option-btn.correct { background: rgba(46,204,113,0.18); border-color: var(--green); animation: correctPulse 0.5s ease; }
  .option-btn.correct .letter { background: var(--green); color: white; }
  .option-btn.wrong { background: rgba(255,71,87,0.18); border-color: var(--red); animation: shake 0.4s ease; }
  .option-btn.wrong .letter { background: var(--red); color: white; }
  .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
  @keyframes correctPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

  /* MATCHING */
  .matching-wrap { display: flex; flex-direction: column; gap: 10px; }
  .match-row {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.03); border-radius: 14px; padding: 12px 16px;
    border: 2px solid rgba(255,255,255,0.08);
  }
  .match-desc { flex: 1; font-size: 0.92rem; font-weight: 700; color: rgba(255,255,255,0.9); }
  .match-select {
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 8px 12px; color: white;
    font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; outline: none; transition: all 0.2s; min-width: 130px;
  }
  .match-select option { background: #1a1a2e; color: white; }
  .match-select:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,212,170,0.2); }
  .match-select.correct { border-color: var(--green); background: rgba(46,204,113,0.15); }
  .match-select.wrong { border-color: var(--red); background: rgba(255,71,87,0.15); }

  /* FILL IN */
  .fill-input {
    width: 100%; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.18);
    border-radius: 14px; padding: 14px 18px; color: white;
    font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 700;
    outline: none; transition: all 0.2s;
  }
  .fill-input:focus { border-color: var(--teal); background: rgba(0,212,170,0.07); box-shadow: 0 0 0 4px rgba(0,212,170,0.12); }
  .fill-input.correct { border-color: var(--green); background: rgba(46,204,113,0.1); }
  .fill-input.wrong { border-color: var(--red); background: rgba(255,71,87,0.1); }
  .fill-input::placeholder { color: rgba(255,255,255,0.28); }

  .submit-btn {
    margin-top: 13px; background: linear-gradient(135deg, var(--teal), #059669);
    border: none; border-radius: 14px; padding: 13px 28px; color: white;
    font-family: 'Fredoka One', cursive; font-size: 1.15rem; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,212,170,0.3); letter-spacing: 0.5px;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,212,170,0.4); }

  /* FEEDBACK */
  .feedback {
    margin-top: 15px; padding: 13px 17px; border-radius: 13px;
    font-weight: 700; font-size: 0.95rem; display: none;
    align-items: flex-start; gap: 10px; line-height: 1.5;
  }
  .feedback.show { display: flex; animation: fadeIn 0.3s ease; }
  .feedback.correct-fb { background: rgba(46,204,113,0.13); border: 2px solid rgba(46,204,113,0.35); color: #7FFFC4; }
  .feedback.wrong-fb { background: rgba(255,71,87,0.13); border: 2px solid rgba(255,71,87,0.35); color: #FFB3BB; }
  .feedback-icon { font-size: 1.35rem; flex-shrink: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* HINT */
  .hint-btn {
    background: none; border: 2px solid rgba(255,215,0,0.35); border-radius: 50px;
    padding: 5px 14px; color: var(--yellow); font-family: 'Nunito', sans-serif;
    font-size: 0.82rem; font-weight: 800; cursor: pointer; transition: all 0.2s; margin-top: 11px;
  }
  .hint-btn:hover { background: rgba(255,215,0,0.08); border-color: var(--yellow); }
  .hint-text {
    margin-top: 7px; padding: 9px 13px; background: rgba(255,215,0,0.09);
    border-radius: 10px; color: var(--yellow); font-size: 0.88rem; font-weight: 700; display: none;
  }
  .hint-text.show { display: block; animation: fadeIn 0.3s ease; }

  /* NEXT BTN */
  .next-btn {
    display: none; width: 100%; margin-top: 15px;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    border: none; border-radius: 15px; padding: 15px; color: var(--dark);
    font-family: 'Fredoka One', cursive; font-size: 1.25rem; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 15px rgba(255,215,0,0.28);
  }
  .next-btn.show { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .next-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 28px rgba(255,215,0,0.38); }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* RESULT */
  .result-screen { display: none; text-align: center; padding: 40px 20px; animation: slideIn 0.5s ease; }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 5rem; margin-bottom: 18px; animation: bounce 1s infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  .result-title { font-family: 'Fredoka One', cursive; font-size: clamp(2rem,6vw,3rem); margin-bottom: 8px; }
  .result-score-big { font-family: 'Fredoka One', cursive; font-size: clamp(3rem,10vw,5rem); line-height: 1; margin: 18px 0; }
  .result-msg { font-size: 1.05rem; font-weight: 700; color: rgba(255,255,255,0.65); margin-bottom: 28px; }
  .stars-display { font-size: 2.4rem; margin: 8px 0 18px; }
  .restart-btn {
    background: linear-gradient(135deg, var(--purple), #6D28D9); border: none;
    border-radius: 18px; padding: 17px 44px; color: white;
    font-family: 'Fredoka One', cursive; font-size: 1.35rem; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 6px 25px rgba(168,85,247,0.38);
  }
  .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(168,85,247,0.48); }

  /* CONFETTI */
  .confetti-piece { position: fixed; pointer-events: none; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  /* TRUE/FALSE */
  .tf-wrap { display: flex; gap: 12px; }
  .tf-btn {
    flex: 1; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 14px; color: white; font-family: 'Fredoka One', cursive;
    font-size: 1.2rem; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .tf-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .tf-btn.true-btn:hover:not(:disabled) { background: rgba(46,204,113,0.15); border-color: var(--green); }
  .tf-btn.false-btn:hover:not(:disabled) { background: rgba(255,71,87,0.15); border-color: var(--red); }
  .tf-btn.correct { background: rgba(46,204,113,0.2); border-color: var(--green); animation: correctPulse 0.5s; }
  .tf-btn.wrong { background: rgba(255,71,87,0.2); border-color: var(--red); animation: shake 0.4s; }
  .tf-btn:disabled { cursor: not-allowed; opacity: 0.7; }
</style>
</head>
<body>

<div class="bg-floats" id="bgFloats"></div>

<div class="container">
  <div class="header">
    <h1>🧠 Brain & Nerves Quiz!</h1>
    <p>Chapter 2 · Your Communication Network</p>
  </div>

  <div class="score-bar">
    <div class="score-item stars">
      <div class="score-label">⭐ Stars</div>
      <div class="score-value" id="starCount">0</div>
    </div>
    <div class="score-item correct">
      <div class="score-label">✅ Correct</div>
      <div class="score-value" id="correctCount">0</div>
    </div>
    <div class="score-item total">
      <div class="score-label">📋 Total</div>
      <div class="score-value" id="totalCount">0/18</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="question-badge" id="questionBadge">🧠 Question 1</div>
    <div class="question-text" id="questionText"></div>
    <div id="answerArea"></div>
    <div class="feedback" id="feedback">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span id="feedbackText"></span>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question ➡️</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle" style="color: var(--teal);">Quiz Complete!</div>
    <div class="result-score-big" id="resultScore"></div>
    <div class="stars-display" id="resultStars"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Play Again!</button>
  </div>
</div>

<script>
const questions = [

  // ── SECTION 1: Nervous System Basics ──
  {
    type: 'mc',
    badge: '🧠 Nervous System',
    question: 'Which of these is part of the CENTRAL Nervous System (CNS)?',
    options: ['Nerves branching into the body', 'Reflexes', 'Brain and spinal cord', 'Messenger-relay system'],
    answer: 2,
    feedback: 'The CNS = Brain + Spinal Cord. Both are protected (enclosed) in bone! 🦴',
    hint: 'CNS is enclosed in bone!'
  },
  {
    type: 'mc',
    badge: '🧠 Nervous System',
    question: 'Which is the correct order from SMALLEST to LARGEST unit?',
    options: [
      'organ → tissue → cell → system → body',
      'cell → tissue → organ → system → body',
      'body → system → organ → tissue → cell',
      'tissue → cell → organ → body → system'
    ],
    answer: 1,
    feedback: 'Cells → Tissue → Organ → System → Body! Think: building blocks getting bigger! 🏗️',
    hint: 'Start with the tiniest building block of life!'
  },
  {
    type: 'tf',
    badge: '✅ True or False',
    question: 'TRUE or FALSE: Reflexes are controlled by the BRAIN.',
    answer: false,
    feedback: 'FALSE! Reflexes are controlled by the SPINAL CORD — that\'s why they happen so fast, without thinking! ⚡',
    hint: 'Reflexes happen BEFORE your brain processes what happened!'
  },
  {
    type: 'mc',
    badge: '🧠 Nervous System',
    question: 'What does the spinal cord do?',
    options: [
      'Controls thinking and memory',
      'Carries messages to and from the brain',
      'Makes reflexes happen slowly',
      'Helps you breathe automatically'
    ],
    answer: 1,
    feedback: 'The spinal cord is like a highway — carrying messages between the brain and the rest of the body! 🛣️',
    hint: 'Think of it as a message highway!'
  },

  // ── SECTION 2: Parts of the Brain ──
  {
    type: 'mc',
    badge: '🧠 Brain Parts',
    question: 'Which part of the brain controls THINKING, reasoning, and sensory input?',
    options: ['Brain stem', 'Cerebellum', 'Spinal cord', 'Cerebrum'],
    answer: 3,
    feedback: 'CEREBRUM is the largest part of the brain — it controls thinking, reasoning, memory, and senses! 💭',
    hint: 'It\'s the biggest part of the brain!'
  },
  {
    type: 'mc',
    badge: '🧠 Brain Parts',
    question: 'Which part of the brain controls BALANCE and coordination of voluntary muscles?',
    options: ['Cerebrum', 'Brain stem', 'Cerebellum', 'Optic nerve'],
    answer: 2,
    feedback: 'CEREBELLUM controls balance and muscle coordination — like when you skate or button a shirt! ⛸️',
    hint: 'Ce-BELL-um... think of balancing a bell!'
  },
  {
    type: 'mc',
    badge: '🧠 Brain Parts',
    question: 'Which part of the brain controls INVOLUNTARY functions like breathing and heartbeat?',
    options: ['Cerebrum', 'Cerebellum', 'Brain stem', 'Cochlea'],
    answer: 2,
    feedback: 'BRAIN STEM controls automatic (involuntary) functions — like breathing while you sleep! 😴',
    hint: 'These are things your body does automatically!'
  },
  {
    type: 'mc',
    badge: '🧠 Brain Parts',
    question: 'Which activity would the CEREBELLUM help you with?',
    options: ['Remembering a math fact', 'Breathing while you sleep', 'Buttoning your shirt', 'Hearing a whisper'],
    answer: 2,
    feedback: 'Buttoning a shirt needs coordination and muscle control — that\'s the CEREBELLUM! 👕',
    hint: 'Which one needs balance and coordination?'
  },

  // ── SECTION 3: Nerves ──
  {
    type: 'mc',
    badge: '⚡ Nerves',
    question: 'What do SENSORY nerves do?',
    options: [
      'Carry messages from brain to muscles',
      'Control involuntary functions',
      'Carry messages from the body to the brain',
      'Control reflexes only'
    ],
    answer: 2,
    feedback: 'Sensory nerves carry messages FROM the body TO the brain — like feeling a bee sting! 🐝',
    hint: 'Sensory = your senses sending info TO the brain!'
  },
  {
    type: 'mc',
    badge: '⚡ Nerves',
    question: 'What do MOTOR nerves do?',
    options: [
      'Carry messages from the body to the brain',
      'Send smell messages to the brain',
      'Control balance and coordination',
      'Carry messages from brain to the muscles'
    ],
    answer: 3,
    feedback: 'Motor nerves carry messages FROM the brain TO your muscles — so you can move! 💪',
    hint: 'Motor = movement! Brain tells muscles what to do!'
  },
  {
    type: 'mc',
    badge: '⚡ Nerves',
    question: 'You catch a baseball. Your hand squeezes the glove. Which nerve type made that happen?',
    options: ['Sensory nerve', 'Olfactory nerve', 'Optic nerve', 'Motor nerve'],
    answer: 3,
    feedback: 'Motor nerve! The brain sent the signal to your hand muscles to squeeze — that\'s motor nerve! ⚾',
    hint: 'The brain is telling muscles what to DO!'
  },

  // ── SECTION 4: The Eye ──
  {
    type: 'mc',
    badge: '👁️ The Eye',
    question: 'What is the RETINA?',
    options: [
      'The white part of the eye',
      'The layer of nerve cells at the back of the eye',
      'The transparent front of the eye',
      'The round hole that lets in light'
    ],
    answer: 1,
    feedback: 'RETINA = layer of nerve cells at the BACK of the eye. It receives the image! 📸',
    hint: 'It\'s at the very back of the eyeball!'
  },
  {
    type: 'mc',
    badge: '👁️ The Eye',
    question: 'What does the PUPIL do?',
    options: [
      'Sends messages of sight to the brain',
      'Focuses what you are seeing',
      'Controls the round hole that lets in light',
      'Lets in the right amount of light'
    ],
    answer: 3,
    feedback: 'The PUPIL is the round hole (the dark circle) that controls how much light enters the eye! 🌟',
    hint: 'It\'s the dark circle in the middle of your eye!'
  },
  {
    type: 'mc',
    badge: '👁️ The Eye',
    question: 'Which nerve carries the message of SIGHT to the brain?',
    options: ['Auditory nerve', 'Olfactory nerve', 'Motor nerve', 'Optic nerve'],
    answer: 3,
    feedback: 'OPTIC nerve carries sight messages to the brain! Optic = related to eyes! 👁️',
    hint: 'Optic = related to eyes and seeing!'
  },

  // ── SECTION 5: The Ear ──
  {
    type: 'mc',
    badge: '👂 The Ear',
    question: 'What is the COCHLEA?',
    options: [
      'The thin tissue separating outer and inner ear',
      'The tube through which sound waves travel',
      'The fluid-filled part that receives sound vibrations',
      'The nerve that sends sound to the brain'
    ],
    answer: 2,
    feedback: 'The COCHLEA is filled with liquid and receives sound vibrations — it looks like a snail shell! 🐌',
    hint: 'It\'s shaped like a snail and filled with liquid!'
  },
  {
    type: 'mc',
    badge: '👂 The Ear',
    question: 'Which part of the ear helps your body SENSE BALANCE?',
    options: ['Cochlea', 'Eardrum', 'Auditory canal', 'Semicircular canals'],
    answer: 3,
    feedback: 'SEMICIRCULAR CANALS help you sense balance! They\'re in your inner ear. 🔄',
    hint: 'These are loop-shaped tubes in the inner ear!'
  },
  {
    type: 'mc',
    badge: '👂 The Ear',
    question: 'Which nerve carries messages of HEARING to the brain?',
    options: ['Optic nerve', 'Olfactory nerve', 'Auditory nerve', 'Motor nerve'],
    answer: 2,
    feedback: 'AUDITORY nerve sends hearing messages to the brain! Auditory = related to hearing! 🎵',
    hint: 'Auditory = related to hearing and sound!'
  },

  // ── SECTION 6: Caring for your Nervous System ──
  {
    type: 'mc',
    badge: '💚 Stay Healthy',
    question: 'How many hours of sleep does a Grade 4 student need each night?',
    options: ['6–7 hours', '8–9 hours', '10–11 hours', '12–13 hours'],
    answer: 2,
    feedback: 'Kids need 10–11 hours of sleep! Your brain grows and recharges while you sleep! 😴✨',
    hint: 'It\'s more than adults need!'
  },
  {
    type: 'mc',
    badge: '💚 Stay Healthy',
    question: 'Which of these helps PROTECT your nervous system?',
    options: [
      'Eating lots of sugar',
      'Skipping sleep',
      'Wearing a helmet and seatbelt',
      'Taking drugs'
    ],
    answer: 2,
    feedback: 'Wearing a helmet and seatbelt protects your brain and spinal cord from injury! 🪖',
    hint: 'Think about protecting your head and back!'
  },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffledQ, currentIndex, correctCount, stars, answered;

function init() {
  shuffledQ = shuffle(questions);
  currentIndex = 0; correctCount = 0; stars = 0; answered = false;
  document.getElementById('totalCount').textContent = `0/${shuffledQ.length}`;
  updateScoreBar();
  renderQuestion();
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
}

function updateScoreBar() {
  document.getElementById('starCount').textContent = stars;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('totalCount').textContent = `${currentIndex}/${shuffledQ.length}`;
  document.getElementById('progressBar').style.width = `${(currentIndex / shuffledQ.length) * 100}%`;
}

function renderQuestion() {
  answered = false;
  const q = shuffledQ[currentIndex];
  document.getElementById('questionBadge').textContent = q.badge + '  Q' + (currentIndex + 1) + ' of ' + shuffledQ.length;
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').className = 'next-btn';

  const card = document.getElementById('questionCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';

  const area = document.getElementById('answerArea');
  area.innerHTML = '';

  if (q.type === 'mc') {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    const letters = ['A','B','C','D'];
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
      btn.onclick = () => selectMC(i);
      grid.appendChild(btn);
    });
    area.appendChild(grid);

  } else if (q.type === 'tf') {
    const wrap = document.createElement('div');
    wrap.className = 'tf-wrap';
    const tBtn = document.createElement('button');
    tBtn.className = 'tf-btn true-btn';
    tBtn.textContent = '✅ TRUE';
    tBtn.onclick = () => selectTF(true);
    const fBtn = document.createElement('button');
    fBtn.className = 'tf-btn false-btn';
    fBtn.textContent = '❌ FALSE';
    fBtn.onclick = () => selectTF(false);
    wrap.appendChild(tBtn);
    wrap.appendChild(fBtn);
    area.appendChild(wrap);

  } else if (q.type === 'fill') {
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'fill-input'; input.id = 'fillInput';
    input.placeholder = 'Type your answer here...';
    input.onkeydown = (e) => { if (e.key === 'Enter') checkFill(); };
    area.appendChild(input);
    const subBtn = document.createElement('button');
    subBtn.className = 'submit-btn'; subBtn.textContent = '✅ Check Answer'; subBtn.onclick = checkFill;
    area.appendChild(subBtn);
  }

  // Hint
  const hintBtn = document.createElement('button');
  hintBtn.className = 'hint-btn'; hintBtn.textContent = '💡 Hint';
  const hintText = document.createElement('div');
  hintText.className = 'hint-text'; hintText.textContent = '💡 ' + q.hint;
  hintBtn.onclick = () => hintText.classList.toggle('show');
  area.appendChild(hintBtn);
  area.appendChild(hintText);

  updateScoreBar();
}

function selectMC(idx) {
  if (answered) return;
  answered = true;
  const q = shuffledQ[currentIndex];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  if (idx === q.answer) {
    btns[idx].classList.add('correct');
    showFeedback(true, '⭐ Correct! ' + q.feedback);
    correctCount++; stars++; sparkle();
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    showFeedback(false, '❌ Not quite! The answer was: "' + q.options[q.answer] + '". ' + q.feedback);
  }
  document.getElementById('nextBtn').classList.add('show');
  updateScoreBar();
}

function selectTF(userAnswer) {
  if (answered) return;
  answered = true;
  const q = shuffledQ[currentIndex];
  const btns = document.querySelectorAll('.tf-btn');
  btns.forEach(b => b.disabled = true);
  const isCorrect = userAnswer === q.answer;
  if (userAnswer === true) { btns[0].classList.add(isCorrect ? 'correct' : 'wrong'); if (!isCorrect) btns[1].classList.add('correct'); }
  else { btns[1].classList.add(isCorrect ? 'correct' : 'wrong'); if (!isCorrect) btns[0].classList.add('correct'); }
  if (isCorrect) { showFeedback(true, '⭐ Correct! ' + q.feedback); correctCount++; stars++; sparkle(); }
  else { showFeedback(false, '❌ Not quite! ' + q.feedback); }
  document.getElementById('nextBtn').classList.add('show');
  updateScoreBar();
}

function checkFill() {
  if (answered) return;
  const q = shuffledQ[currentIndex];
  const input = document.getElementById('fillInput');
  const userAns = input.value.trim().toLowerCase();
  const correct = q.answer.toLowerCase();
  const alts = (q.altAnswers || []).map(a => a.toLowerCase());
  answered = true; input.disabled = true;
  if (userAns === correct || alts.includes(userAns)) {
    input.classList.add('correct');
    showFeedback(true, '⭐ Correct! ' + q.feedback);
    correctCount++; stars++; sparkle();
  } else {
    input.classList.add('wrong');
    showFeedback(false, `❌ The answer is: "${q.answer}". ${q.feedback}`);
  }
  document.getElementById('nextBtn').classList.add('show');
  updateScoreBar();
}

function showFeedback(isCorrect, text) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  document.getElementById('feedbackIcon').textContent = isCorrect ? '🎉' : '💙';
  document.getElementById('feedbackText').textContent = text;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffledQ.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('resultScreen').classList.add('show');
  updateScoreBar();
  const pct = Math.round((correctCount / shuffledQ.length) * 100);
  document.getElementById('resultScore').textContent = `${correctCount} / ${shuffledQ.length}`;
  let emoji, title, msg, starStr;
  if (pct === 100) {
    emoji='🏆'; title='PERFECT SCORE!'; msg='You\'re a Brain genius, Max! 🌟🧠';
    starStr='⭐⭐⭐⭐⭐'; document.getElementById('resultScore').style.color='#FFD700'; launchConfetti();
  } else if (pct >= 80) {
    emoji='🎉'; title='Great Job!'; msg='You really know your nervous system! 💪';
    starStr='⭐⭐⭐⭐'; document.getElementById('resultScore').style.color='#2ECC71';
  } else if (pct >= 60) {
    emoji='👍'; title='Good Try!'; msg='Getting there! Review the tricky ones and try again! 📖';
    starStr='⭐⭐⭐'; document.getElementById('resultScore').style.color='#00D4AA';
  } else {
    emoji='💪'; title='Keep Studying!'; msg='Practice makes perfect! Try again! 🔄';
    starStr='⭐⭐'; document.getElementById('resultScore').style.color='#FF8C00';
  }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultStars').textContent = starStr;
}

function restartQuiz() {
  document.getElementById('resultScreen').classList.remove('show');
  init();
}

function sparkle() {
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.textContent = ['⭐','✨','💫','🌟'][Math.floor(Math.random()*4)];
      el.style.cssText = `position:fixed;font-size:1.5rem;pointer-events:none;z-index:999;left:${20+Math.random()*60}%;top:${20+Math.random()*50}%;animation:confettiFall 1s ease forwards;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }, i * 60);
  }
}

function launchConfetti() {
  const colors = ['#00D4AA','#A855F7','#FFD700','#2ECC71','#FF4757','#3B82F6'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()}s;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

function createBgFloats() {
  const container = document.getElementById('bgFloats');
  const emojis = ['🧠','⚡','👁️','👂','🔬','💡'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'bg-float';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.cssText = `left:${Math.random()*100}%;font-size:${20+Math.random()*22}px;animation-duration:${13+Math.random()*16}s;animation-delay:${Math.random()*14}s;`;
    container.appendChild(el);
  }
}

createBgFloats();
init();
</script>
